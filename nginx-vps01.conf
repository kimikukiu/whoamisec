# ============================================================
# VPS-01 — nginx config for whoamisec.com + MinIO S3
# Place at: /etc/nginx/sites-enabled/whoamisec.conf
# ============================================================

client_max_body_size 500M;

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name whoamisec.com www.whoamisec.com
                api.whoamisec.com dashboard.whoamisec.com
                admin.whoamisec.com jarvis.whoamisec.com
                mining.whoamisec.com downloads.whoamisec.com
                apps.whoamisec.com s3.whoamisec.com
                storage.whoamisec.com;
    return 301 https://$host$request_uri;
}

# whoamisec.com — main site
server {
    listen 443 ssl http2;
    server_name whoamisec.com www.whoamisec.com;
    ssl_certificate     /etc/letsencrypt/live/whoamisec.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/whoamisec.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    root /var/www/whoamisec; index index.html;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    location / { try_files $uri $uri.html $uri/ /index.html; }
    location /api/ { proxy_pass http://127.0.0.1:5001/api/; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; proxy_read_timeout 120s; }
    location /health { proxy_pass http://127.0.0.1:5001/api/v1/health; }
}

# api.whoamisec.com
server {
    listen 443 ssl http2; server_name api.whoamisec.com;
    ssl_certificate     /etc/letsencrypt/live/whoamisec.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/whoamisec.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    location / { proxy_pass http://127.0.0.1:5001; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; proxy_read_timeout 120s; }
}

# dashboard.whoamisec.com
server {
    listen 443 ssl http2; server_name dashboard.whoamisec.com;
    ssl_certificate     /etc/letsencrypt/live/whoamisec.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/whoamisec.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    root /var/www/whoamisec; location / { try_files /dashboard.html =404; }
    location /api/ { proxy_pass http://127.0.0.1:5001/api/; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; }
}

# admin.whoamisec.com
server {
    listen 443 ssl http2; server_name admin.whoamisec.com;
    ssl_certificate     /etc/letsencrypt/live/whoamisec.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/whoamisec.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    root /var/www/whoamisec; location / { try_files /admin.html =404; }
    location /api/ { proxy_pass http://127.0.0.1:5001/api/; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; }
}

# jarvis.whoamisec.com
server {
    listen 443 ssl http2; server_name jarvis.whoamisec.com;
    ssl_certificate     /etc/letsencrypt/live/whoamisec.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/whoamisec.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    root /var/www/whoamisec; location / { try_files /jarvis-mind-app.html /jarvis.html =404; }
    location /api/ { proxy_pass http://127.0.0.1:5001/api/; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; }
}

# mining.whoamisec.com
server {
    listen 443 ssl http2; server_name mining.whoamisec.com;
    ssl_certificate     /etc/letsencrypt/live/whoamisec.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/whoamisec.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    root /var/www/whoamisec; location / { try_files /mining.html =404; }
    location /api/ { proxy_pass http://127.0.0.1:5001/api/; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; }
}

# downloads.whoamisec.com
server {
    listen 443 ssl http2; server_name downloads.whoamisec.com;
    ssl_certificate     /etc/letsencrypt/live/whoamisec.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/whoamisec.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    root /var/www/whoamisec; location / { try_files /downloads.html =404; }
    location /api/ { proxy_pass http://127.0.0.1:5001/api/; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; }
}

# apps.whoamisec.com — APK/IPA file server
server {
    listen 443 ssl http2; server_name apps.whoamisec.com;
    ssl_certificate     /etc/letsencrypt/live/whoamisec.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/whoamisec.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    root /var/apk; autoindex on; autoindex_exact_size off; autoindex_localtime on;
    location / { add_header Content-Disposition 'attachment'; types { application/vnd.android.package-archive apk; } try_files $uri =404; }
}

# s3.whoamisec.com — MinIO S3 API
server {
    listen 443 ssl http2; server_name s3.whoamisec.com;
    ssl_certificate     /etc/letsencrypt/live/whoamisec.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/whoamisec.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    client_max_body_size 2G;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off; proxy_request_buffering off;
    location / { proxy_pass http://127.0.0.1:9000; proxy_read_timeout 300s; proxy_send_timeout 300s; }
}

# storage.whoamisec.com — MinIO Web Console
server {
    listen 443 ssl http2; server_name storage.whoamisec.com;
    ssl_certificate     /etc/letsencrypt/live/whoamisec.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/whoamisec.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    location / { proxy_pass http://127.0.0.1:9001; proxy_read_timeout 86400s; }
}
