# ── apps.whoamisec.com — APK file server ─────────────────────
server {
    listen 443 ssl http2;
    server_name apps.whoamisec.com;
    ssl_certificate     /etc/letsencrypt/live/whoamisec.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/whoamisec.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    root /var/apk;
    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;

    location / {
        add_header Content-Disposition 'attachment';
        types { application/vnd.android.package-archive apk; }
        try_files $uri =404;
    }
}
