# ============================================================
# VPS-01 — nginx config for whoamisec.com + all subdomains
# Place at: /etc/nginx/sites-enabled/whoamisec.conf
# Run: certbot --nginx -d whoamisec.com -d www.whoamisec.com \
#   -d api.whoamisec.com -d dashboard.whoamisec.com \
#   -d admin.whoamisec.com -d jarvis.whoamisec.com \
#   -d mining.whoamisec.com -d downloads.whoamisec.com \
#   -d apps.whoamisec.com
# ============================================================

# Redirect HTTP → HTTPS for all subdomains
server {
    listen 80;
    server_name whoamisec.com www.whoamisec.com
                api.whoamisec.com dashboard.whoamisec.com
                admin.whoamisec.com jarvis.whoamisec.com
                mining.whoamisec.com downloads.whoamisec.com
                apps.whoamisec.com;
    return 301 https://$host$request_uri;
}

# ── Main: whoamisec.com ──────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name whoamisec.com www.whoamisec.com;

    ssl_certificate     /etc/letsencrypt/live/whoamisec.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/whoamisec.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/whoamisec;
    index index.html;

    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / { try_files $uri $uri.html $uri/ /index.html; }

    location /api/ {
        proxy_pass http://127.0.0.1:5001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }

    location /health { proxy_pass http://127.0.0.1:5001/api/v1/health; }
}

# ── api.whoamisec.com ────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.whoamisec.com;
    ssl_certificate     /etc/letsencrypt/live/whoamisec.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/whoamisec.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }
}

# ── dashboard.whoamisec.com ──────────────────────────────────
server {
    listen 443 ssl http2;
    server_name dashboard.whoamisec.com;
