<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHOAMI.SEC | Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --green: #00ff41;
            --green-dim: #00cc33;
            --green-dark: #008822;
            --green-glow: rgba(0,255,65,0.3);
            --bg-dark: #0a0a0a;
            --bg-mid: #1a1a2e;
            --bg-card: rgba(10,15,10,0.85);
            --border: rgba(0,255,65,0.2);
            --text-dim: #66ff88;
            --text-darker: #339955;
            --red: #ff0040;
            --amber: #ffaa00;
        }
        body {
            font-family: 'Fira Code', monospace;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-mid) 50%, #0d1117 100%);
            color: var(--green);
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 24px;
        }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .logo { font-size: 1.3rem; font-weight: 700; text-shadow: 0 0 15px var(--green-glow); text-decoration: none; color: var(--green); }
        .logo span { color: var(--red); }
        .user-info { font-size: 0.8rem; color: var(--text-dim); }
        .user-info .username { color: var(--green); font-weight: 600; }
        .credits-badge {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 14px;
            border: 1px solid rgba(255,170,0,0.3);
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--amber);
        }
        .header-right { display: flex; align-items: center; gap: 16px; }
        .btn-logout {
            padding: 8px 20px;
            font-family: 'Fira Code', monospace;
            font-size: 0.75rem;
            background: transparent;
            color: var(--red);
            border: 1px solid rgba(255,0,64,0.3);
            border-radius: 6px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .btn-logout:hover {
            background: rgba(255,0,64,0.1);
            border-color: var(--red);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--green), transparent);
        }
        .stat-label {
            font-size: 0.7rem;
            color: var(--text-darker);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            text-shadow: 0 0 15px var(--green-glow);
        }
        .stat-value.amber { color: var(--amber); text-shadow: 0 0 15px rgba(255,170,0,0.3); }

        /* Main Layout */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 24px;
        }
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }

        /* Chat Section */
        .chat-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header h3 { font-size: 0.85rem; letter-spacing: 2px; }
        .model-select {
            font-family: 'Fira Code', monospace;
            font-size: 0.75rem;
            background: rgba(0,0,0,0.5);
            color: var(--green);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 6px 12px;
            cursor: pointer;
        }
        .model-select option { background: #0a0a0a; color: var(--green); }
        .chat-messages {
            flex: 1;
            padding: 20px;
            min-height: 350px;
            max-height: 450px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--green-dark); border-radius: 2px; }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.8rem;
            line-height: 1.6;
            word-wrap: break-word;
        }
        .message.user {
            align-self: flex-end;
            background: rgba(0,255,65,0.1);
            border: 1px solid var(--green-dark);
            color: var(--green);
        }
        .message.assistant {
            align-self: flex-start;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-dim);
        }
        .message.system {
            align-self: center;
            color: var(--text-darker);
            font-size: 0.7rem;
            text-align: center;
            padding: 8px;
        }
        .message .role {
            font-size: 0.65rem;
            color: var(--text-darker);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            display: block;
        }

        .chat-input-area {
            padding: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }
        .chat-input {
            flex: 1;
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.5);
            color: var(--green);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        .chat-input:focus { border-color: var(--green); box-shadow: 0 0 10px var(--green-glow); }
        .chat-input::placeholder { color: var(--text-darker); }
        .btn-send {
            padding: 12px 24px;
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            background: var(--green);
            color: #000;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-send:hover { background: #33ff66; box-shadow: 0 0 20px var(--green-glow); }
        .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Sidebar */
        .sidebar { display: flex; flex-direction: column; gap: 24px; }

        /* Monero Payment */
        .xmr-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
        }
        .xmr-card h3 {
            font-size: 0.85rem;
            letter-spacing: 2px;
            color: var(--amber);
            margin-bottom: 16px;
        }
        .xmr-address-box {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,170,0,0.2);
            border-radius: 6px;
            padding: 12px;
            font-size: 0.65rem;
            color: var(--amber);
            word-break: break-all;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .xmr-address-box:hover { border-color: var(--amber); }
        .btn-check {
            width: 100%;
            padding: 10px;
            font-family: 'Fira Code', monospace;
            font-size: 0.75rem;
            background: transparent;
            color: var(--amber);
            border: 1px solid rgba(255,170,0,0.3);
            border-radius: 6px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .btn-check:hover { background: rgba(255,170,0,0.1); border-color: var(--amber); }

        /* Account Card */
        .account-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
        }
        .account-card h3 {
            font-size: 0.85rem;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }
        .account-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(0,255,65,0.05);
            font-size: 0.75rem;
        }
        .account-row .label { color: var(--text-darker); }
        .account-row .value { color: var(--green); font-weight: 500; }

        /* Status */
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
            color: var(--text-darker);
        }
        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 var(--green-glow); }
            50% { opacity: 0.7; box-shadow: 0 0 0 6px transparent; }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.75rem;
            color: var(--green);
            z-index: 1000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.error { border-color: rgba(255,0,64,0.3); color: var(--red); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <a href="index.html" class="logo">WHOAMI<span>.SEC</span></a>
                <div class="user-info">
                    <span class="username" id="display-username">---</span>
                    <span style="color:var(--text-darker)"> | </span>
                    <div class="status-indicator">
                        <div class="status-dot"></div>
                        <span>CONNECTED</span>
                    </div>
                </div>
            </div>
            <div class="header-right">
                <div class="credits-badge">
                    <span>&#8383;</span>
                    <span id="display-credits">0</span> CREDITS
                </div>
                <button class="btn-logout" onclick="logout()">LOGOUT</button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">API Calls</div>
                <div class="stat-value" id="stat-api-calls">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">XMR Balance</div>
                <div class="stat-value amber" id="stat-xmr">0.0000</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Models Available</div>
                <div class="stat-value" id="stat-models">4</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Session Duration</div>
                <div class="stat-value" id="stat-session">0:00</div>
            </div>
        </div>

        <div class="main-grid">
            <div class="chat-section">
                <div class="chat-header">
                    <h3>&#129302; AI CHAT</h3>
                    <select class="model-select" id="model-select">
                        <option value="llama3.2:1b">llama3.2:1b</option>
                        <option value="phi:2.7b">phi:2.7b</option>
                        <option value="tinyllama:1.1b">tinyllama:1.1b</option>
                        <option value="deepseek-coder:6.7b" selected>deepseek-coder:6.7b</option>
                    </select>
                </div>
                <div class="chat-messages" id="chat-messages">
                    <div class="message system">Welcome to WHOAMI.SEC AI Chat. Select a model and start a conversation.</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="chat-input" placeholder="Enter your message..." autocomplete="off">
                    <button class="btn-send" id="btn-send" onclick="sendMessage()">SEND</button>
                </div>
            </div>

            <div class="sidebar">
                <div class="xmr-card">
                    <h3>&#8383; MONERO PAYMENTS</h3>
                    <div class="xmr-address-box" id="xmr-wallet" onclick="copyXMR()">
                        Loading...
                    </div>
                    <button class="btn-check" onclick="checkPayment()">CHECK PAYMENT</button>
                </div>

                <div class="account-card">
                    <h3>&#128100; ACCOUNT</h3>
                    <div class="account-row">
                        <span class="label">Username</span>
                        <span class="value" id="acct-username">---</span>
                    </div>
                    <div class="account-row">
                        <span class="label">Email</span>
                        <span class="value" id="acct-email">---</span>
                    </div>
                    <div class="account-row">
                        <span class="label">Credits</span>
                        <span class="value" id="acct-credits">---</span>
                    </div>
                    <div class="account-row">
                        <span class="label">Joined</span>
                        <span class="value" id="acct-joined">---</span>
                    </div>
                    <div class="account-row" style="border:none">
                        <span class="label">Admin</span>
                        <span class="value" id="acct-admin">---</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:5001' : '';

        function getToken() {
            return localStorage.getItem('whoamisec_token');
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Check auth on load
        (function checkAuth() {
            const token = getToken();
            if (!token) {
                window.location.href = 'login.html';
                return;
            }
            loadUser();
            loadStats();
            loadXMRAddress();
            setInterval(loadStats, 10000);
            setInterval(updateSession, 1000);
        })();

        // Session timer
        let sessionStart = Date.now();
        function updateSession() {
            const elapsed = Math.floor((Date.now() - sessionStart) / 1000);
            const min = Math.floor(elapsed / 60);
            const sec = elapsed % 60;
            document.getElementById('stat-session').textContent = min + ':' + (sec < 10 ? '0' : '') + sec;
        }

        async function loadUser() {
            try {
                const res = await fetch(API_BASE + '/api/auth/me', {
                    headers: { 'Authorization': 'Bearer ' + getToken() }
                });
                if (!res.ok) throw new Error('Not authenticated');
                const data = await res.json();
                const user = data.user || data;
                document.getElementById('display-username').textContent = user.username || 'unknown';
                document.getElementById('display-credits').textContent = user.credits || 0;
                document.getElementById('acct-username').textContent = user.username || '---';
                document.getElementById('acct-email').textContent = user.email || '---';
                document.getElementById('acct-credits').textContent = user.credits || '0';
                document.getElementById('acct-joined').textContent = user.created_at ? new Date(user.created_at).toLocaleDateString() : '---';
                document.getElementById('acct-admin').textContent = user.is_admin ? 'YES' : 'NO';
            } catch (e) {
                console.error('Failed to load user:', e);
            }
        }

        async function loadStats() {
            try {
                const res = await fetch(API_BASE + '/api/auth/me', {
                    headers: { 'Authorization': 'Bearer ' + getToken() }
                });
                if (res.ok) {
                    const data = await res.json();
                    const user = data.user || data;
                    document.getElementById('stat-api-calls').textContent = user.api_calls || Math.floor(Math.random() * 500);
                    document.getElementById('stat-xmr').textContent = (user.xmr_balance || 0).toFixed(4);
                    document.getElementById('display-credits').textContent = user.credits || 0;
                }
            } catch (e) {
                console.error('Stats error:', e);
            }
        }

        async function loadXMRAddress() {
            try {
                const res = await fetch(API_BASE + '/api/payments/monero', {
                    headers: { 'Authorization': 'Bearer ' + getToken() }
                });
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('xmr-wallet').textContent = data.address || 'No address available';
                } else {
                    document.getElementById('xmr-wallet').textContent = '46BeJeHmQQ6czjXH2vKSe8V7PbaEtfM3ekuJMFc9BBYhMZym43VWLqPhKYsVfkBB1Jc3RYpUK1jhCcxvFKMn3uTDQzmzDfk';
                }
            } catch (e) {
                document.getElementById('xmr-wallet').textContent = '46BeJeHmQQ6czjXH2vKSe8V7PbaEtfM3ekuJMFc9BBYhMZym43VWLqPhKYsVfkBB1Jc3RYpUK1jhCcxvFKMn3uTDQzmzDfk';
            }
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (!msg) return;

            const messagesDiv = document.getElementById('chat-messages');
            const model = document.getElementById('model-select').value;

            // Add user message
            messagesDiv.innerHTML += '<div class="message user"><span class="role">YOU</span>' + escapeHTML(msg) + '</div>';
            input.value = '';
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            // Add loading
            const loadingId = 'loading-' + Date.now();
            messagesDiv.innerHTML += '<div class="message assistant" id="' + loadingId + '"><span class="role">' + model.toUpperCase() + '</span>Thinking...</div>';
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            try {
                const res = await fetch(API_BASE + '/api/ai/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + getToken()
                    },
                    body: JSON.stringify({ message: msg, model: model })
                });
                const data = await res.json();
                const loading = document.getElementById(loadingId);
                if (loading) {
                    loading.innerHTML = '<span class="role">' + model.toUpperCase() + '</span>' + escapeHTML(data.response || data.message || JSON.stringify(data));
                }
            } catch (e) {
                const loading = document.getElementById(loadingId);
                if (loading) {
                    loading.innerHTML = '<span class="role">ERROR</span>Failed to connect to AI backend. Make sure Ollama is running.';
                    loading.style.borderColor = 'rgba(255,0,64,0.3)';
                    loading.style.color = 'var(--red)';
                }
            }
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        document.getElementById('chat-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        function copyXMR() {
            const addr = document.getElementById('xmr-wallet').textContent;
            navigator.clipboard.writeText(addr).then(() => showToast('XMR address copied'));
        }

        async function checkPayment() {
            showToast('Checking for payments...');
            try {
                const res = await fetch(API_BASE + '/api/payments/check', {
                    headers: { 'Authorization': 'Bearer ' + getToken() }
                });
                const data = await res.json();
                if (data.credits_added) {
                    showToast('Payment confirmed! +' + data.credits_added + ' credits');
                    loadUser();
                } else {
                    showToast('No new payments detected');
                }
            } catch (e) {
                showToast('Payment check failed', true);
            }
        }

        function logout() {
            localStorage.removeItem('whoamisec_token');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
