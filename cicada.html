<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CICADA 3301</title>
    <meta name="description" content="Cicada 3301 — We are everywhere.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow-x:hidden;background:#000}

        /* Digital Rain Canvas */
        #rain{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}

        /* Scanline overlay */
        body::after{
            content:'';position:fixed;top:0;left:0;width:100%;height:100%;
            background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.01) 2px,rgba(255,255,255,0.01) 4px);
            pointer-events:none;z-index:9998;
        }

        /* Color cycling via JS */
        :root{
            --neon:#ff0033;
            --neon-glow:rgba(255,0,51,0.5);
            --neon-dim:rgba(255,0,51,0.25);
            --neon-soft:rgba(255,0,51,0.08);
        }

        /* ── FULL VIEWPORT HERO ── */
        .hero{
            position:relative;z-index:1;
            display:flex;flex-direction:column;align-items:center;justify-content:center;
            min-height:100vh;padding:20px;text-align:center;
        }

        /* ── TAG (top-left, like luiz_33001) ── */
        .tag{
            position:fixed;top:16px;left:20px;z-index:10;
            font-family:'Share Tech Mono',monospace;
            font-size:0.7rem;
            color:var(--neon-dim);
            letter-spacing:2px;text-transform:uppercase;
            opacity:0.7;transition:color 0.6s;
        }

        /* ── TITLE ── */
        .hero h1{
            font-family:'Orbitron',sans-serif;
            font-size:clamp(1.6rem,5vw,3rem);
            font-weight:900;
            color:var(--neon);
            letter-spacing:clamp(6px,1.5vw,14px);
            text-transform:uppercase;
            text-shadow:
                0 0 8px var(--neon-glow),
                0 0 20px var(--neon-glow),
                0 0 40px var(--neon-dim),
                0 0 80px var(--neon-soft);
            margin-bottom:12px;
            transition:color 0.6s,text-shadow 0.6s;
            animation:flicker 4s infinite;
        }
        .hero .sub{
            font-family:'Share Tech Mono',monospace;
            font-size:clamp(0.55rem,1.2vw,0.75rem);
            color:var(--neon-dim);
            letter-spacing:3px;text-transform:uppercase;
            margin-bottom:25px;
            transition:color 0.6s;
        }

        @keyframes flicker{
            0%,100%{opacity:1}92%{opacity:1}93%{opacity:0.5}94%{opacity:1}96%{opacity:0.3}97%{opacity:1}
        }

        /* ── SMALL CICADA SVG (~200px) ── */
        .cicada-wrap{
            width:200px;height:200px;
            position:relative;
            margin-bottom:20px;
        }
        .cicada-wrap svg{
            width:100%;height:100%;
            filter:drop-shadow(0 0 12px var(--neon-glow)) drop-shadow(0 0 30px var(--neon-dim));
            transition:filter 0.6s;
        }
        .cicada-wrap svg *{transition:stroke 0.6s,fill 0.6s}

        /* ── PUZZLES SECTION ── */
        .puzzles{
            position:relative;z-index:1;
            max-width:1100px;margin:0 auto;
            padding:30px 20px 50px;
        }
        .sec-label{
            font-family:'Orbitron',sans-serif;
            font-size:0.85rem;color:var(--neon);
            letter-spacing:5px;text-transform:uppercase;
            text-align:center;margin-bottom:25px;
            text-shadow:0 0 8px var(--neon-glow);
            transition:color 0.6s;
        }
        .pgrid{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
            gap:14px;
        }
        .pcard{
            background:rgba(0,0,0,0.7);
            border:1px solid var(--neon-dim);
            border-radius:5px;padding:18px;cursor:pointer;
            transition:all 0.3s;position:relative;overflow:hidden;
        }
        .pcard::before{
            content:'';position:absolute;top:0;left:0;width:100%;height:2px;
            background:linear-gradient(90deg,transparent,var(--neon),transparent);
            opacity:0;transition:opacity 0.3s;
        }
        .pcard:hover{border-color:var(--neon);transform:translateY(-2px);box-shadow:0 4px 20px var(--neon-soft)}
        .pcard:hover::before{opacity:1}
        .pc-lvl{font-family:'Orbitron',sans-serif;font-size:0.5rem;color:var(--neon-dim);letter-spacing:3px;text-transform:uppercase;margin-bottom:5px}
        .pc-nm{font-family:'Orbitron',sans-serif;font-size:0.85rem;font-weight:700;color:var(--neon);margin-bottom:5px;text-shadow:0 0 5px var(--neon-glow);transition:color 0.6s}
        .pc-df{display:inline-block;font-size:0.55rem;padding:2px 7px;border-radius:10px;margin-bottom:7px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
        .df-beginner{background:rgba(0,255,102,0.1);color:#00ff66;border:1px solid rgba(0,255,102,0.2)}
        .df-easy{background:rgba(0,255,255,0.08);color:#00ffff;border:1px solid rgba(0,255,255,0.15)}
        .df-medium{background:rgba(255,204,0,0.08);color:#ffcc00;border:1px solid rgba(255,204,0,0.15)}
        .df-hard{background:rgba(255,102,0,0.08);color:#ff6600;border:1px solid rgba(255,102,0,0.15)}
        .df-expert{background:rgba(255,0,51,0.08);color:#ff0033;border:1px solid rgba(255,0,51,0.15)}
        .df-legendary{background:rgba(204,0,255,0.08);color:#cc00ff;border:1px solid rgba(204,0,255,0.15)}
        .df-mythic{background:rgba(204,0,255,0.12);color:#cc00ff;border:1px solid rgba(204,0,255,0.25);text-shadow:0 0 4px rgba(204,0,255,0.4)}
        .pc-ds{font-family:'Share Tech Mono',monospace;font-size:0.68rem;color:rgba(255,255,255,0.4);line-height:1.4;margin-bottom:8px}
        .pc-rw{font-size:0.65rem;color:#ffd700}
        .pc-mt{display:flex;justify-content:space-between;margin-top:6px;font-size:0.55rem;color:var(--neon-dim);opacity:0.5}

        /* ── LEADERBOARD ── */
        .lb{max-width:700px;margin:30px auto;background:rgba(0,0,0,0.6);border:1px solid var(--neon-dim);border-radius:5px;padding:18px;max-height:280px;overflow-y:auto}
        .lb h3{font-family:'Orbitron',sans-serif;color:#ffd700;font-size:0.75rem;letter-spacing:3px;text-align:center;margin-bottom:10px}
        .lbr{display:flex;justify-content:space-between;padding:5px 8px;border-bottom:1px solid rgba(255,255,255,0.02);font-family:'Share Tech Mono',monospace;font-size:0.7rem}
        .lbr:hover{background:rgba(255,255,255,0.02)}
        .lbr-r{font-weight:700;min-width:30px}
        .lbr-1{color:#ffd700;text-shadow:0 0 5px rgba(255,215,0,0.4)}
        .lbr-2{color:#c0c0c0}
        .lbr-3{color:#cd7f32}
        .lbr-n{flex:1;color:rgba(255,255,255,0.6)}
        .lbr-p{color:var(--neon);transition:color 0.6s}

        /* ── TELEGRAM ── */
        .tgb{text-align:center;margin:25px auto;max-width:460px;padding:18px;border:1px solid var(--neon-dim);border-radius:5px;background:rgba(0,0,0,0.5)}
        .tgb p{font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:rgba(255,255,255,0.35);margin-bottom:10px;letter-spacing:2px;text-transform:uppercase}
        .tgl{display:inline-flex;align-items:center;gap:7px;padding:9px 22px;border:1px solid var(--neon);color:var(--neon);font-family:'Orbitron',sans-serif;font-size:0.7rem;font-weight:600;letter-spacing:2px;text-decoration:none;border-radius:3px;transition:all 0.3s}
        .tgl:hover{background:var(--neon);color:#000;box-shadow:0 0 15px var(--neon-glow)}

        /* ── FOOTER ── */
        .ft{text-align:center;padding:25px 20px;font-family:'Orbitron',sans-serif;font-size:0.5rem;color:var(--neon-dim);letter-spacing:2px;opacity:0.4}
        .ft .xmr{font-size:0.45rem;color:rgba(255,255,255,0.12);margin-top:6px;word-break:break-all;font-family:'Share Tech Mono',monospace}

        /* ── MODAL ── */
        .mbg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:5000;justify-content:center;align-items:center}
        .mbg.active{display:flex}
        .mbox{background:#050505;border:1px solid var(--neon);border-radius:6px;padding:24px;max-width:480px;width:90%;box-shadow:0 0 30px var(--neon-dim)}
        .mbox h3{font-family:'Orbitron',sans-serif;color:var(--neon);font-size:0.8rem;letter-spacing:3px;margin-bottom:10px;text-shadow:0 0 6px var(--neon-glow)}
        .mbox .md{font-family:'Share Tech Mono',monospace;color:rgba(255,255,255,0.45);font-size:0.75rem;line-height:1.5;margin-bottom:6px;padding:8px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.04);border-radius:3px}
        .mbox .mr{color:#ffd700;font-size:0.75rem;margin-bottom:10px}
        .mbox input,.mbox textarea{width:100%;background:rgba(0,0,0,0.6);border:1px solid var(--neon-dim);color:var(--neon);padding:8px 10px;font-family:'Share Tech Mono',monospace;font-size:0.78rem;border-radius:3px;margin-bottom:6px;outline:none;transition:border-color 0.3s}
        .mbox input:focus,.mbox textarea:focus{border-color:var(--neon);box-shadow:0 0 6px var(--neon-soft)}
        .mbox input::placeholder,.mbox textarea::placeholder{color:rgba(255,255,255,0.12)}
        .mbs{display:flex;gap:6px;margin-top:3px}
        .btn-s{flex:1;padding:9px;background:var(--neon);color:#000;border:none;font-family:'Orbitron',sans-serif;font-size:0.65rem;font-weight:700;letter-spacing:2px;cursor:pointer;border-radius:3px;transition:all 0.3s}
        .btn-s:hover{box-shadow:0 0 12px var(--neon-glow);transform:translateY(-1px)}
        .btn-h{padding:9px 12px;background:transparent;color:#ff6600;border:1px solid #ff6600;font-family:'Orbitron',sans-serif;font-size:0.55rem;font-weight:600;letter-spacing:1px;cursor:pointer;border-radius:3px;transition:all 0.3s}
        .btn-h:hover{background:#ff6600;color:#000}
        .btn-c{padding:9px 12px;background:transparent;color:rgba(255,255,255,0.25);border:1px solid rgba(255,255,255,0.08);font-family:'Share Tech Mono',monospace;font-size:0.65rem;cursor:pointer;border-radius:3px}

        /* ── SOUND TOGGLE ── */
        .st{position:fixed;bottom:16px;right:16px;z-index:500;width:34px;height:34px;background:rgba(0,0,0,0.8);border:1px solid var(--neon-dim);border-radius:50%;display:flex;justify-content:center;align-items:center;cursor:pointer;transition:all 0.3s;font-size:1rem}
        .st:hover{border-color:var(--neon);box-shadow:0 0 10px var(--neon-dim)}
        .st.muted{opacity:0.3}

        /* ── RESPONSIVE ── */
        @media(max-width:768px){
            .pgrid{grid-template-columns:1fr}
            .lb,.tgb{margin:18px 12px}
            .cicada-wrap{width:150px;height:150px}
            .tag{font-size:0.55rem;top:8px;left:10px}
        }
    </style>
</head>
<body>

<script>
/* ── 1. DIGITAL RAIN ── */
(function(){
    const c=document.getElementById('rain'),x=c.getContext('2d');
    let W,H,cols,dr,fs=14;
    function rz(){W=c.width=innerWidth;H=c.height=innerHeight;cols=Math.floor(W/fs);dr=Array.from({length:cols},()=>Math.random()*H/fs|0)}
    rz();addEventListener('resize',rz);
    function rc(a){const n=getComputedStyle(document.documentElement).getPropertyValue('--neon').trim();return n+Math.round(a*255).toString(16).padStart(2,'0')}
    function draw(){
        x.fillStyle='rgba(0,0,0,0.05)';x.fillRect(0,0,W,H);
        x.font=fs+'px Share Tech Mono,monospace';
        for(let i=0;i<cols;i++){
            const ch=String.fromCharCode(0x30A0+Math.random()*96),px=i*fs,py=dr[i]*fs;
            x.fillStyle=rc(0.85);x.fillText(ch,px,py);
            x.fillStyle=rc(0.25);x.fillText(ch,px,py-fs);
            if(py>H&&Math.random()>0.975)dr[i]=0;
            dr[i]++;
        }
        requestAnimationFrame(draw);
    }
    draw();
})();

/* ── 2. COLOR CYCLING: red → green → lime → purple → red ── */
(function(){
    const C=[
        {n:'#ff0033',g:'rgba(255,0,51,',d:'rgba(255,0,51,0.25)',s:'rgba(255,0,51,0.08)'},
        {n:'#00ff41',g:'rgba(0,255,65,',d:'rgba(0,255,65,0.25)',s:'rgba(0,255,65,0.08)'},
        {n:'#39ff14',g:'rgba(57,255,20,',d:'rgba(57,255,20,0.25)',s:'rgba(57,255,20,0.08)'},
        {n:'#bf00ff',g:'rgba(191,0,255,',d:'rgba(191,0,255,0.25)',s:'rgba(191,0,255,0.08)'},
    ];
    let i=0;const r=document.documentElement.style;
    function sc(i){const c=C[i%C.length];r.setProperty('--neon',c.n);r.setProperty('--neon-glow',c.g+'0.5)');r.setProperty('--neon-dim',c.d);r.setProperty('--neon-soft',c.s)}
    sc(0);setInterval(()=>{i++;sc(i%C.length)},2000);
})();

/* ── 3. CICADA SOUND (real MP3) ── */
const audioEl=document.getElementById('cicadaAudio');
audioEl.volume=0.3;
let sndMuted=false;

function toggleSound(){
    const b=document.getElementById('sndBtn');
    if(sndMuted){audioEl.play();sndMuted=false;b.classList.remove('muted')}
    else{audioEl.pause();sndMuted=true;b.classList.add('muted')}
}
// Auto-play on first interaction
document.addEventListener('click',function o(){audioEl.play().catch(()=>{});document.removeEventListener('click',o)},{once:true});
document.addEventListener('touchstart',function o(){audioEl.play().catch(()=>{});document.removeEventListener('touchstart',o)},{once:true});

/* ── 4. PUZZLES ── */
const puzzles=[
    {id:'initiation',name:'Initiation',diff:'Beginner',reward:'0.01 XMR',pts:100,time:'24h',cat:'Cryptography',desc:'Decode: "01001101 01101111 01101110 01100101 01110010 01101111"',hint:'Binary to text'},
    {id:'caesar',name:"Caesar's Truth",diff:'Easy',reward:'0.02 XMR',pts:200,time:'48h',cat:'Classical Cipher',desc:'L FDPH, L VDZ, L FRQTXHUHG. Cipher: VQREWLVDQD',hint:'ROT13 is everywhere. 3301.'},
    {id:'primus',name:'Liber Primus',diff:'Medium',reward:'0.05 XMR',pts:500,time:'72h',cat:'Runes',desc:'Runestones: F U Th A R Ka G W H N I J P I X S T B E M L Ng D O',hint:'Elder Futhark runes. The answer is 3 words.'},
    {id:'rsa',name:'RSA Secret',diff:'Hard',reward:'0.10 XMR',pts:1000,time:'120h',cat:'Modern Crypto',desc:'n = 3233, e = 17, ciphertext = 2790. Decrypt the message.',hint:'p = 53, q = 61'},
    {id:'stegano',name:'Hidden Image',diff:'Expert',reward:'0.25 XMR',pts:2500,time:'168h',cat:'Steganography',desc:'The image contains a secret. LSB steganography. Extract from blue channel.',hint:'Least significant bits.'},
    {id:'chain',name:'Blockchain Trail',diff:'Expert',reward:'0.50 XMR',pts:5000,time:'240h',cat:'Blockchain',desc:'Follow the Monero trail through the darknet nodes.',hint:'The answer is in the blockchain comments.'},
    {id:'quantum',name:'Quantum Maze',diff:'Legendary',reward:'1.00 XMR',pts:10000,time:'336h',cat:'Quantum',desc:'Qubit states: |0>, |1>, |+>, |->. Circuit: H, CNOT, H. Measure.',hint:'Bell state. 4-letter word.'},
    {id:'prophecy',name:"Cicada's Prophecy",diff:'Mythic',reward:'2.50 XMR',pts:25000,time:'720h',cat:'Mystery',desc:'LK2@#8$n!9$#KJ@!$#@L:>{">?<L":{P{">?<L":@!$#KJ@!$#LK@LK@LK@3301',hint:'XOR with 3301.'}

document.getElementById('puzzleGrid').innerHTML=puzzles.map((p,i)=>`
    <div class="pcard" onclick="openPuzzle('${p.id}')">

/* ── 5. MODAL ── */
let cur=null;
function openPuzzle(id){cur=puzzles.find(p=>p.id===id);if(!cur)return;document.getElementById('mT').textContent='\u{1F511} '+cur.name;document.getElementById('mD').textContent=cur.desc;document.getElementById('mR').innerHTML='\u{1F4B0} '+cur.reward+' | \u{1F3AF} '+cur.pts+' pts';document.getElementById('iA').value='';document.getElementById('modal').classList.add('active')}
function closeModal(){document.getElementById('modal').classList.remove('active')}
async function sha256(m){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(m));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')}
function getH(id){return{'initiation':'money','caesar':'inthissign','primus':'threeswords','rsa':'rsa2026','stegano':'pixeltruth','chain':'monero','quantum':'bell','prophecy':'3301cicada'}[id]||''}
async function submitAnswer(){if(!cur)return;const a=document.getElementById('iA').value.trim();if(!a){alert('Enter your decoded answer.');return}const h=await sha256(a);if(h===await sha256(getH(cur.id))){alert('\u2705 CORRECT!\n\n'+cur.name+' solved!\n+'+cur.pts+' points\n'+cur.reward);closeModal()}else{alert('\u274C Incorrect. The code awaits decryption.')}}
function buyHint(){if(!cur)return;alert('\u{1F4A1} HINT: '+cur.hint+'\n\nCost: 0.005 XMR')}
