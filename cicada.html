<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CICADA 3301</title>
    <meta name="description" content="Cicada 3301 — The puzzle awaits. Decode to prove yourself.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow-x:hidden;background:#000}

        /* ════════════════════════════════════════════════════════
           DIGITAL RAIN — Canvas behind everything
           ════════════════════════════════════════════════════════ */
        #rain{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}

        /* ════════════════════════════════════════════════════════
           SCANLINE OVERLAY
           ════════════════════════════════════════════════════════ */
        body::after{
            content:'';position:fixed;top:0;left:0;width:100%;height:100%;
            background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.012) 2px,rgba(255,255,255,0.012) 4px);
            pointer-events:none;z-index:9998;
        }

        /* ════════════════════════════════════════════════════════
           COLOR CYCLING — CSS custom property driven by JS
           ════════════════════════════════════════════════════════ */
        :root{
            --neon:#ff0033;
            --neon-glow:rgba(255,0,51,0.5);
            --neon-dim:rgba(255,0,51,0.25);
            --neon-soft:rgba(255,0,51,0.08);
        }

        /* ════════════════════════════════════════════════════════
           HERO — Full viewport, centered
           ════════════════════════════════════════════════════════ */
        .hero{
            position:relative;z-index:1;
            display:flex;flex-direction:column;align-items:center;justify-content:center;
            min-height:100vh;
            padding:40px 20px;
            text-align:center;
        }

        /* — @proplanwh tag (top-left like luiz_33001) — */
        .tag{
            position:fixed;top:18px;left:22px;z-index:10;
            font-family:'Share Tech Mono',monospace;
            font-size:clamp(0.6rem,1.2vw,0.8rem);
            color:var(--neon-dim);
            letter-spacing:2px;
            text-transform:uppercase;
            opacity:0.7;
            transition:color 0.6s;
        }

        /* — Main Title — */
        .hero h1{
            font-family:'Orbitron',sans-serif;
            font-size:clamp(2.2rem,7vw,5rem);
            font-weight:900;
            color:var(--neon);
            letter-spacing:clamp(8px,2vw,20px);
            text-transform:uppercase;
            text-shadow:
                0 0 10px var(--neon-glow),
                0 0 30px var(--neon-glow),
                0 0 60px var(--neon-dim),
                0 0 100px var(--neon-soft);
            margin-bottom:20px;
            transition:color 0.6s,text-shadow 0.6s;
            animation:flicker 4s infinite;
        }

        @keyframes flicker{
            0%,100%{opacity:1}
            92%{opacity:1}
            93%{opacity:0.6}
            94%{opacity:1}
            96%{opacity:0.4}
            97%{opacity:1}
        }

        /* — Subtitle — */
        .hero .subtitle{
            font-family:'Share Tech Mono',monospace;
            font-size:clamp(0.65rem,1.4vw,0.9rem);
            color:var(--neon-dim);
            letter-spacing:4px;
            text-transform:uppercase;
            margin-bottom:50px;
            transition:color 0.6s;
        }

        /* ════════════════════════════════════════════════════════
           CICADA SVG — Large, detailed, glowing
           ════════════════════════════════════════════════════════ */
        .cicada-wrap{
            width:clamp(280px,50vw,500px);
            height:clamp(280px,50vw,500px);
            position:relative;
            margin-bottom:50px;
        }
        .cicada-wrap svg{
            width:100%;height:100%;
            filter:drop-shadow(0 0 15px var(--neon-glow)) drop-shadow(0 0 40px var(--neon-dim));
            transition:filter 0.6s;
        }
        .cicada-wrap svg *{
            transition:stroke 0.6s,fill 0.6s;
        }

        /* ════════════════════════════════════════════════════════
           PUZZLES SECTION — Below the fold
           ════════════════════════════════════════════════════════ */
        .puzzles-section{
            position:relative;z-index:1;
            max-width:1200px;
            margin:0 auto;
            padding:40px 20px 60px;
        }
        .section-label{
            font-family:'Orbitron',sans-serif;
            font-size:clamp(0.7rem,1.5vw,1rem);
            color:var(--neon);
            letter-spacing:6px;
            text-transform:uppercase;
            text-align:center;
            margin-bottom:30px;
            text-shadow:0 0 10px var(--neon-glow);
            transition:color 0.6s,text-shadow 0.6s;
        }
        .puzzle-grid{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
            gap:16px;
        }
        .puzzle-card{
            background:rgba(0,0,0,0.7);
            border:1px solid var(--neon-dim);
            border-radius:6px;
            padding:20px;
            cursor:pointer;
            transition:all 0.3s;
            position:relative;
            overflow:hidden;
        }
        .puzzle-card::before{
            content:'';position:absolute;top:0;left:0;width:100%;height:2px;
            background:linear-gradient(90deg,transparent,var(--neon),transparent);
            opacity:0;transition:opacity 0.3s;
        }
        .puzzle-card:hover{
            border-color:var(--neon);
            transform:translateY(-3px);
            box-shadow:0 6px 25px var(--neon-soft);
        }
        .puzzle-card:hover::before{opacity:1}
        .pc-level{
            font-family:'Orbitron',sans-serif;
            font-size:0.55rem;color:var(--neon-dim);
            letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;
        }
        .pc-name{
            font-family:'Orbitron',sans-serif;
            font-size:0.95rem;font-weight:700;color:var(--neon);
            margin-bottom:6px;text-shadow:0 0 6px var(--neon-glow);
            transition:color 0.6s;
        }
        .pc-diff{
            display:inline-block;font-size:0.6rem;padding:2px 8px;
            border-radius:12px;margin-bottom:8px;font-weight:600;
            letter-spacing:1px;text-transform:uppercase;
        }
        .diff-beginner{background:rgba(0,255,102,0.1);color:#00ff66;border:1px solid rgba(0,255,102,0.25)}
        .diff-easy{background:rgba(0,255,255,0.08);color:#00ffff;border:1px solid rgba(0,255,255,0.2)}
        .diff-medium{background:rgba(255,204,0,0.08);color:#ffcc00;border:1px solid rgba(255,204,0,0.2)}
        .diff-hard{background:rgba(255,102,0,0.08);color:#ff6600;border:1px solid rgba(255,102,0,0.2)}
        .diff-expert{background:rgba(255,0,51,0.08);color:#ff0033;border:1px solid rgba(255,0,51,0.2)}
        .diff-legendary{background:rgba(204,0,255,0.08);color:#cc00ff;border:1px solid rgba(204,0,255,0.2)}
        .diff-mythic{background:rgba(204,0,255,0.12);color:#cc00ff;border:1px solid rgba(204,0,255,0.3);text-shadow:0 0 4px rgba(204,0,255,0.5)}
        .pc-desc{
            font-family:'Share Tech Mono',monospace;
            font-size:0.72rem;color:rgba(255,255,255,0.45);
            line-height:1.5;margin-bottom:10px;
        }
        .pc-reward{font-size:0.7rem;color:#ffd700}
        .pc-meta{
            display:flex;justify-content:space-between;margin-top:8px;
            font-size:0.6rem;color:var(--neon-dim);opacity:0.6;
        }

        /* ════════════════════════════════════════════════════════
           LEADERBOARD
           ════════════════════════════════════════════════════════ */
        .leaderboard{
            max-width:800px;margin:40px auto;
            background:rgba(0,0,0,0.6);
            border:1px solid var(--neon-dim);
            border-radius:6px;padding:20px;
            max-height:320px;overflow-y:auto;
        }
        .leaderboard h3{
            font-family:'Orbitron',sans-serif;
            color:#ffd700;font-size:0.8rem;letter-spacing:4px;
            text-align:center;margin-bottom:12px;
        }
        .lb-row{
            display:flex;justify-content:space-between;
            padding:6px 10px;border-bottom:1px solid rgba(255,255,255,0.03);
            font-family:'Share Tech Mono',monospace;font-size:0.75rem;
        }
        .lb-row:hover{background:rgba(255,255,255,0.02)}
        .lb-rank{font-weight:700;min-width:35px}
        .lb-r1{color:#ffd700;text-shadow:0 0 6px rgba(255,215,0,0.4)}
        .lb-r2{color:#c0c0c0}
        .lb-r3{color:#cd7f32}
        .lb-name{flex:1;color:rgba(255,255,255,0.7)}
        .lb-pts{color:var(--neon);transition:color 0.6s}

        /* ════════════════════════════════════════════════════════
           TELEGRAM BANNER
           ════════════════════════════════════════════════════════ */
        .tg-banner{
            text-align:center;margin:30px auto;max-width:500px;
            padding:20px;border:1px solid var(--neon-dim);
            border-radius:6px;background:rgba(0,0,0,0.5);
        }
        .tg-banner p{
            font-family:'Share Tech Mono',monospace;
            font-size:0.75rem;color:rgba(255,255,255,0.4);
            margin-bottom:12px;letter-spacing:2px;text-transform:uppercase;
        }
        .tg-link{
            display:inline-flex;align-items:center;gap:8px;
            padding:10px 25px;border:1px solid var(--neon);
            color:var(--neon);font-family:'Orbitron',sans-serif;
            font-size:0.75rem;font-weight:600;letter-spacing:2px;
            text-decoration:none;border-radius:4px;transition:all 0.3s;
        }
        .tg-link:hover{
            background:var(--neon);color:#000;
            box-shadow:0 0 20px var(--neon-glow);
        }

        /* ════════════════════════════════════════════════════════
           FOOTER
           ════════════════════════════════════════════════════════ */
        .footer{
            text-align:center;padding:30px 20px;
            font-family:'Orbitron',sans-serif;font-size:0.55rem;
            color:var(--neon-dim);letter-spacing:3px;opacity:0.5;
        }
        .footer .xmr{
            font-size:0.5rem;color:rgba(255,255,255,0.15);
            margin-top:8px;word-break:break-all;
            font-family:'Share Tech Mono',monospace;
        }

        /* ════════════════════════════════════════════════════════
           MODAL
           ════════════════════════════════════════════════════════ */
        .modal-bg{
            display:none;position:fixed;top:0;left:0;width:100%;height:100%;
            background:rgba(0,0,0,0.95);z-index:5000;
            justify-content:center;align-items:center;
        }
        .modal-bg.active{display:flex}
        .modal-box{
            background:#050505;border:1px solid var(--neon);
            border-radius:8px;padding:28px;max-width:520px;width:92%;
            box-shadow:0 0 40px var(--neon-dim);
        }
        .modal-box h3{
            font-family:'Orbitron',sans-serif;color:var(--neon);
            font-size:0.9rem;letter-spacing:3px;margin-bottom:12px;
            text-shadow:0 0 8px var(--neon-glow);
        }
        .modal-box .m-desc{
            font-family:'Share Tech Mono',monospace;
            color:rgba(255,255,255,0.5);font-size:0.78rem;line-height:1.6;
            margin-bottom:8px;padding:10px;
            background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.05);
            border-radius:4px;
        }
        .modal-box .m-reward{color:#ffd700;font-size:0.8rem;margin-bottom:12px}
        .modal-box input,.modal-box textarea{
            width:100%;background:rgba(0,0,0,0.6);
            border:1px solid var(--neon-dim);color:var(--neon);
            padding:9px 12px;font-family:'Share Tech Mono',monospace;
            font-size:0.82rem;border-radius:4px;margin-bottom:8px;
            outline:none;transition:border-color 0.3s;
        }
        .modal-box input:focus,.modal-box textarea:focus{border-color:var(--neon);box-shadow:0 0 8px var(--neon-soft)}
        .modal-box input::placeholder,.modal-box textarea::placeholder{color:rgba(255,255,255,0.15)}
        .modal-btns{display:flex;gap:8px;margin-top:4px}
        .btn-submit{
            flex:1;padding:10px;background:var(--neon);color:#000;border:none;
            font-family:'Orbitron',sans-serif;font-size:0.7rem;font-weight:700;
            letter-spacing:2px;cursor:pointer;border-radius:4px;transition:all 0.3s;
        }
        .btn-submit:hover{box-shadow:0 0 15px var(--neon-glow);transform:translateY(-1px)}
        .btn-hint{
            padding:10px 14px;background:transparent;color:#ff6600;
            border:1px solid #ff6600;font-family:'Orbitron',sans-serif;
            font-size:0.6rem;font-weight:600;letter-spacing:1px;
            cursor:pointer;border-radius:4px;transition:all 0.3s;
        }
        .btn-hint:hover{background:#ff6600;color:#000}
        .btn-close{
            padding:10px 14px;background:transparent;color:rgba(255,255,255,0.3);
            border:1px solid rgba(255,255,255,0.1);
            font-family:'Share Tech Mono',monospace;font-size:0.7rem;
            cursor:pointer;border-radius:4px;
        }

        /* ════════════════════════════════════════════════════════
           SOUND TOGGLE
           ════════════════════════════════════════════════════════ */
        .snd-toggle{
            position:fixed;bottom:18px;right:18px;z-index:500;
            width:38px;height:38px;background:rgba(0,0,0,0.8);
            border:1px solid var(--neon-dim);border-radius:50%;
            display:flex;justify-content:center;align-items:center;
            cursor:pointer;transition:all 0.3s;font-size:1.1rem;
        }
        .snd-toggle:hover{border-color:var(--neon);box-shadow:0 0 12px var(--neon-dim)}
        .snd-toggle.muted{opacity:0.3}

        /* ════════════════════════════════════════════════════════
           RESPONSIVE
           ════════════════════════════════════════════════════════ */
        @media(max-width:768px){
            .puzzle-grid{grid-template-columns:1fr}
            .leaderboard,.tg-banner{margin:20px 15px}
            .tag{font-size:0.55rem;top:10px;left:12px}
        }
    </style>
</head>
<body>

<!-- Digital Rain Canvas -->
<canvas id="rain"></canvas>

<!-- @proplanwh tag -->
<div class="tag" id="tag">@proplanwh</div>

<!-- Sound Toggle -->
<div class="snd-toggle" id="sndToggle" onclick="toggleSound()" title="Toggle cicada sound">&#x1F997;</div>

<!-- ═════════════ HERO  ═════════════ -->
<div class="hero">

    <h1 id="mainTitle">CICADA 3301</h1>
    <p class="subtitle" id="subtitle">We are everywhere. Decode to prove yourself.</p>

    <!-- DETAILED CICADA SVG -->
    <div class="cicada-wrap">
        <svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg" id="cicadaSvg">
            <!--
                Detailed cicada — symmetrical, circuit-like wings,
                segmented body, spread legs, antennae
                All strokes use CSS var(--neon) via JS color cycling
            -->

            <!-- ── LEFT WING ── -->
            <!-- Wing outline -->
            <path d="M235 195 Q140 100 80 130 Q40 155 50 200 Q55 250 100 280 Q140 305 235 295"
                  stroke="var(--neon)" stroke-width="1.8" fill="none" opacity="0.85"/>
            <!-- Wing membrane veins -->
            <path d="M235 200 Q160 130 100 160" stroke="var(--neon)" stroke-width="0.7" fill="none" opacity="0.35"/>
            <path d="M235 210 Q170 160 110 190" stroke="var(--neon)" stroke-width="0.7" fill="none" opacity="0.35"/>
            <path d="M235 225 Q175 185 120 215" stroke="var(--neon)" stroke-width="0.7" fill="none" opacity="0.35"/>
            <path d="M235 245 Q170 225 110 250" stroke="var(--neon)" stroke-width="0.7" fill="none" opacity="0.35"/>
            <path d="M235 265 Q165 255 105 275" stroke="var(--neon)" stroke-width="0.7" fill="none" opacity="0.3"/>
            <path d="M235 285 Q160 280 115 290" stroke="var(--neon)" stroke-width="0.5" fill="none" opacity="0.2"/>
            <!-- Cross veins -->
            <path d="M150 150 L150 280" stroke="var(--neon)" stroke-width="0.5" fill="none" opacity="0.25"/>
            <path d="M120 170 L120 275" stroke="var(--neon)" stroke-width="0.5" fill="none" opacity="0.2"/>
            <path d="M100 155 Q115 215 110 270" stroke="var(--neon)" stroke-width="0.4" fill="none" opacity="0.2"/>
            <path d="M80 140 Q100 210 105 265" stroke="var(--neon)" stroke-width="0.4" fill="none" opacity="0.15"/>
            <!-- Wing spots/cells -->
            <ellipse cx="155" cy="200" rx="12" ry="18" stroke="var(--neon)" stroke-width="0.4" fill="none" opacity="0.15"/>
            <ellipse cx="125" cy="230" rx="10" ry="15" stroke="var(--neon)" stroke-width="0.4" fill="none" opacity="0.12"/>
            <ellipse cx="160" cy="255" rx="8" ry="12" stroke="var(--neon)" stroke-width="0.4" fill="none" opacity="0.1"/>

            <!-- ── RIGHT WING ── -->
            <path d="M265 195 Q360 100 420 130 Q460 155 450 200 Q445 250 400 280 Q360 305 265 295"
                  stroke="var(--neon)" stroke-width="1.8" fill="none" opacity="0.85"/>
            <path d="M265 200 Q340 130 400 160" stroke="var(--neon)" stroke-width="0.7" fill="none" opacity="0.35"/>
            <path d="M265 210 Q330 160 390 190" stroke="var(--neon)" stroke-width="0.7" fill="none" opacity="0.35"/>
            <path d="M265 225 Q325 185 380 215" stroke="var(--neon)" stroke-width="0.7" fill="none" opacity="0.35"/>
            <path d="M265 245 Q330 225 390 250" stroke="var(--neon)" stroke-width="0.7" fill="none" opacity="0.35"/>
            <path d="M265 265 Q335 255 395 275" stroke="var(--neon)" stroke-width="0.5" fill="none" opacity="0.3"/>
            <path d="M265 285 Q340 280 385 290" stroke="var(--neon)" stroke-width="0.5" fill="none" opacity="0.2"/>
            <path d="M350 150 L350 280" stroke="var(--neon)" stroke-width="0.5" fill="none" opacity="0.25"/>
            <path d="M380 170 L380 275" stroke="var(--neon)" stroke-width="0.5" fill="none" opacity="0.2"/>
            <path d="M400 155 Q385 215 390 270" stroke="var(--neon)" stroke-width="0.4" fill="none" opacity="0.2"/>
            <path d="M420 140 Q400 210 395 265" stroke="var(--neon)" stroke-width="0.4" fill="none" opacity="0.15"/>
            <ellipse cx="345" cy="200" rx="12" ry="18" stroke="var(--neon)" stroke-width="0.4" fill="none" opacity="0.15"/>
            <ellipse cx="375" cy="230" rx="10" ry="15" stroke="var(--neon)" stroke-width="0.4" fill="none" opacity="0.12"/>
            <ellipse cx="340" cy="255" rx="8" ry="12" stroke="var(--neon)" stroke-width="0.4" fill="none" opacity="0.1"/>

            <!-- ── BODY — Thorax ── -->
            <ellipse cx="250" cy="230" rx="28" ry="18" stroke="var(--neon)" stroke-width="1.4" fill="none" opacity="0.7"/>
            <ellipse cx="250" cy="230" rx="20" ry="12" stroke="var(--neon)" stroke-width="0.6" fill="none" opacity="0.25"/>

            <!-- ── BODY — Abdomen (3 segments) ── -->
            <ellipse cx="250" cy="268" rx="26" ry="14" stroke="var(--neon)" stroke-width="1.2" fill="none" opacity="0.65"/>
            <ellipse cx="250" cy="298" rx="23" ry="13" stroke="var(--neon)" stroke-width="1.2" fill="none" opacity="0.6"/>
            <ellipse cx="250" cy="326" rx="20" ry="11" stroke="var(--neon)" stroke-width="1.0" fill="none" opacity="0.55"/>
            <!-- Abdomen center line -->
            <line x1="250" y1="248" x2="250" y2="335" stroke="var(--neon)" stroke-width="0.5" opacity="0.25"/>

            <!-- ── HEAD ── -->
            <circle cx="250" cy="185" r="18" stroke="var(--neon)" stroke-width="1.5" fill="none" opacity="0.75"/>
            <!-- Eyes — compound -->
            <circle cx="239" cy="180" r="6" stroke="var(--neon)" stroke-width="1" fill="var(--neon)" opacity="0.5"/>
            <circle cx="261" cy="180" r="6" stroke="var(--neon)" stroke-width="1" fill="var(--neon)" opacity="0.5"/>
            <!-- Eye inner detail -->
            <circle cx="239" cy="180" r="2.5" fill="var(--neon)" opacity="0.8"/>
            <circle cx="261" cy="180" r="2.5" fill="var(--neon)" opacity="0.8"/>
            <!-- Proboscis -->
            <path d="M250 195 Q250 205 248 210" stroke="var(--neon)" stroke-width="0.7" fill="none" opacity="0.4"/>

            <!-- ── ANTENNAE ── -->
            <path d="M238 170 Q210 120 175 85" stroke="var(--neon)" stroke-width="1" fill="none" opacity="0.6"/>
            <path d="M262 170 Q290 120 325 85" stroke="var(--neon)" stroke-width="1" fill="none" opacity="0.6"/>
            <!-- Antenna segments -->
            <circle cx="215" cy="130" r="1.5" fill="var(--neon)" opacity="0.4"/>
            <circle cx="195" cy="108" r="1.5" fill="var(--neon)" opacity="0.35"/>
            <circle cx="285" cy="130" r="1.5" fill="var(--neon)" opacity="0.4"/>
            <circle cx="305" cy="108" r="1.5" fill="var(--neon)" opacity="0.35"/>

            <!-- ── LEGS — Left (3 pairs) ── -->
            <!-- Front legs -->
            <path d="M225 225 Q200 245 180 260 Q175 268 180 272" stroke="var(--neon)" stroke-width="0.9" fill="none" opacity="0.45"/>
            <path d="M275 225 Q300 245 320 260 Q325 268 320 272" stroke="var(--neon)" stroke-width="0.9" fill="none" opacity="0.45"/>
            <!-- Middle legs -->
            <path d="M224 255 Q195 275 170 295 Q165 302 170 308" stroke="var(--neon)" stroke-width="0.9" fill="none" opacity="0.4"/>
            <path d="M276 255 Q305 275 330 295 Q335 302 330 308" stroke="var(--neon)" stroke-width="0.9" fill="none" opacity="0.4"/>
            <!-- Hind legs -->
            <path d="M230 290 Q205 315 185 340 Q180 348 185 352" stroke="var(--neon)" stroke-width="0.9" fill="none" opacity="0.35"/>
            <path d="M270 290 Q295 315 315 340 Q320 348 315 352" stroke="var(--neon)" stroke-width="0.9" fill="none" opacity="0.35"/>
            <!-- Leg joints -->
            <circle cx="200" cy="250" r="1.5" fill="var(--neon)" opacity="0.3"/>

<script>
// ────────────────────────────────────────────
// 1. DIGITAL RAIN (Matrix effect on canvas)
// ────────────────────────────────────────────
(function(){
    const c=document.getElementById('rain'),ctx=c.getContext('2d');
    let W,H,cols,drops,fontSize=14;

    function resize(){
        W=c.width=window.innerWidth;
        H=c.height=window.innerHeight;
        cols=Math.floor(W/fontSize);
        drops=Array.from({length:cols},()=>Math.random()*H/fontSize|0);
    }
    resize();
    window.addEventListener('resize',resize);

    function getRainColor(alpha){
        // Uses current neon color from CSS variable
        return getComputedStyle(document.documentElement).getPropertyValue('--neon').trim()+Math.round(alpha*255).toString(16).padStart(2,'0');
    }

    function draw(){
        ctx.fillStyle='rgba(0,0,0,0.05)';
        ctx.fillRect(0,0,W,H);
        ctx.font=fontSize+'px Share Tech Mono, monospace';

        for(let i=0;i<cols;i++){
            const char=String.fromCharCode(0x30A0+Math.random()*96);
            const x=i*fontSize;
            const y=drops[i]*fontSize;

            // Bright head
            ctx.fillStyle=getRainColor(0.9);
            ctx.fillText(char,x,y);

            // Dimmer trail
            ctx.fillStyle=getRainColor(0.3);
            ctx.fillText(char,x,y-fontSize);

            if(y>H && Math.random()>0.975) drops[i]=0;
            drops[i]++;
        }
        requestAnimationFrame(draw);
    }
    draw();
})();

// ────────────────────────────────────────────
// 2. COLOR CYCLING — red → green → lime → purple → red
// ────────────────────────────────────────────
(function(){
    const colors=[
        {neon:'#ff0033',glow:'rgba(255,0,51,',dim:'rgba(255,0,51,0.25)',soft:'rgba(255,0,51,0.08)'},
        {neon:'#00ff41',glow:'rgba(0,255,65,',dim:'rgba(0,255,65,0.25)',soft:'rgba(0,255,65,0.08)'},
        {neon:'#39ff14',glow:'rgba(57,255,20,',dim:'rgba(57,255,20,0.25)',soft:'rgba(57,255,20,0.08)'},
        {neon:'#bf00ff',glow:'rgba(191,0,255,',dim:'rgba(191,0,255,0.25)',soft:'rgba(191,0,255,0.08)'},
    ];
    let idx=0;
    const root=document.documentElement.style;
    const dur=2000; // ms per color step

    function setColors(i){
        const c=colors[i%colors.length];
        root.setProperty('--neon',c.neon);
        root.setProperty('--neon-glow',c.glow+'0.5)');
        root.setProperty('--neon-dim',c.dim);
        root.setProperty('--neon-soft',c.soft);
    }
    setColors(0);

    setInterval(()=>{
        idx++;
        setColors(idx%colors.length);
    },dur);
})();

// ────────────────────────────────────────────
// 3. CICADA SOUND (Web Audio API)
// ────────────────────────────────────────────
let audioCtx=null,soundNodes=[],sndMuted=false;
function createSound(){
    if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const t=audioCtx.currentTime;
    const o1=audioCtx.createOscillator();o1.type='sawtooth';o1.frequency.setValueAtTime(5500,t);
    const l1=audioCtx.createOscillator();l1.frequency.setValueAtTime(35,t);
    const g1=audioCtx.createGain();g1.gain.setValueAtTime(800,t);
    l1.connect(g1);g1.connect(o1.frequency);
    const o2=audioCtx.createOscillator();o2.type='square';o2.frequency.setValueAtTime(8200,t);
    const l3=audioCtx.createOscillator();l3.frequency.setValueAtTime(28,t);
    const g3=audioCtx.createGain();g3.gain.setValueAtTime(600,t);
    l3.connect(g3);g3.connect(o2.frequency);
    const mg=audioCtx.createGain();mg.gain.setValueAtTime(0.04,t);
    const f=audioCtx.createBiquadFilter();f.type='bandpass';f.frequency.setValueAtTime(6000,t);f.Q.setValueAtTime(2,t);
    o1.connect(f);o2.connect(f);f.connect(mg);mg.connect(audioCtx.destination);
    o1.start(t);o2.start(t);l1.start(t);l3.start(t);
    soundNodes=[o1,o2,l1,l3];
}
function stopSound(){soundNodes.forEach(n=>{try{n.stop()}catch(e){}});soundNodes=[];}
function toggleSound(){
    const b=document.getElementById('sndToggle');
    if(sndMuted){createSound();sndMuted=false;b.classList.remove('muted');}
    else{stopSound();sndMuted=true;b.classList.add('muted');}
}
// Auto-start sound on first click
document.addEventListener('click',function once(){createSound();document.removeEventListener('click',once);},{once:true});

let curPz=null;
function openPuzzle(id){
    curPz=puzzles.find(p=>p.id===id);if(!curPz)return;
    document.getElementById('mTitle').textContent='\u{1F511} '+curPz.name;
    document.getElementById('mDesc').textContent=curPz.desc;
    document.getElementById('mReward').innerHTML='\u{1F4B0} '+curPz.reward+' | \u{1F3AF} '+curPz.pts+' pts';
    document.getElementById('inpAnswer').value='';
    document.getElementById('modal').classList.add('active');
}
function closeModal(){document.getElementById('modal').classList.remove('active');}

async function sha256(msg){
    const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function getHash(id){
    const m={'initiation':'money','caesar':'inthissign','primus':'threeswords','rsa':'rsa2026','stegano':'pixeltruth','chain':'monero','quantum':'bell','prophecy':'3301cicada'};
    return m[id]||'';
}
async function submitAnswer(){
    if(!curPz)return;
    const ans=document.getElementById('inpAnswer').value.trim();
    if(!ans){alert('Enter your decoded answer.');return;}
    const hash=await sha256(ans);
    if(hash===await sha256(getHash(curPz.id))){
        alert('\u2705 CORRECT!\n\n'+curPz.name+' solved!\n+'+curPz.pts+' points\n'+curPz.reward+' reward.');
        closeModal();
    }else{alert('\u274C Incorrect. The code awaits decryption.');}
}
function buyHint(){
    if(!curPz)return;
    alert('\u{1F4A1} HINT: '+curPz.hint+'\n\nCost: 0.005 XMR');
}
