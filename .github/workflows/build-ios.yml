name: Build iOS IPAs

on:
  push:
    branches: [main]
    paths:
      - 'jarvis-mind-app.html'
      - 'whoamisec-business-app.html'
      - 'cicada-omni-app.html'
      - 'manifest.json'
      - 'sw.js'
      - '.github/workflows/build-ios.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      # ════════════════════════════════════════════════════════
      # IPA 1 — JARVIS MIND v3
      # ════════════════════════════════════════════════════════
      - name: Init Capacitor — JARVIS MIND iOS
        run: |
          mkdir -p apk-build/www
          cp jarvis-mind-app.html apk-build/www/index.html
          cp manifest.json        apk-build/www/ 2>/dev/null || true
          cp sw.js                apk-build/www/ 2>/dev/null || true

          cd apk-build
          cat > package.json << 'EOF'
          {"name":"jarvis-mind","version":"3.0.0","scripts":{"build":"echo ok"}}
          EOF

          npm install --save-dev \
            @capacitor/cli@latest \
            @capacitor/core@latest \
            @capacitor/ios@latest

          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.whoamisec.jarvis",
            "appName": "JARVIS MIND",
            "webDir": "www",
            "server": {"iosScheme": "https"}
          }
          EOF

          ./node_modules/.bin/cap add ios
          ./node_modules/.bin/cap sync ios

      - name: Patch iOS deployment target — JARVIS MIND
        working-directory: apk-build
        run: |
          find ios -name "project.pbxproj" -exec \
            perl -pi -e 's/IPHONEOS_DEPLOYMENT_TARGET = [\d.]+/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' {} \;

      - name: Build archive — JARVIS MIND
        working-directory: apk-build/ios/App
        run: |
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/JarvisMind.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            clean archive 2>&1 | tee /tmp/xcode-jm.log | grep -E "error:|warning:|ARCHIVE|BUILD" || true
          ls "$RUNNER_TEMP/JarvisMind.xcarchive" && echo "Archive OK" || (cat /tmp/xcode-jm.log; exit 1)

      - name: Package JARVIS MIND IPA
        run: |
          APP=$(find "$RUNNER_TEMP/JarvisMind.xcarchive/Products" -name "*.app" | head -1)
          mkdir -p /tmp/payload_jm/Payload
          cp -r "$APP" "/tmp/payload_jm/Payload/JARVIS MIND.app"
          cd /tmp/payload_jm
          zip -r "$GITHUB_WORKSPACE/JARVIS-MIND-v3.ipa" Payload/
          echo "IPA: $(du -sh $GITHUB_WORKSPACE/JARVIS-MIND-v3.ipa)"

      # ════════════════════════════════════════════════════════
      # IPA 2 — WHOAMISEC Business v16
      # ════════════════════════════════════════════════════════
      - name: Init Capacitor — WHOAMISEC Business iOS
        run: |
          cp whoamisec-business-app.html apk-build/www/index.html

          cd apk-build
          rm -rf ios node_modules

          npm install --save-dev \
            @capacitor/cli@latest \
            @capacitor/core@latest \
            @capacitor/ios@latest

          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.whoamisec.business",
            "appName": "WHOAMISEC Business",
            "webDir": "www",
            "server": {"iosScheme": "https"}
          }
          EOF

          ./node_modules/.bin/cap add ios
          ./node_modules/.bin/cap sync ios

      - name: Patch iOS deployment target — WHOAMISEC Business
        working-directory: apk-build
        run: |
          find ios -name "project.pbxproj" -exec \
            perl -pi -e 's/IPHONEOS_DEPLOYMENT_TARGET = [\d.]+/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' {} \;

      - name: Build archive — WHOAMISEC Business
        working-directory: apk-build/ios/App
        run: |
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/WhoamiSecBusiness.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            clean archive 2>&1 | tee /tmp/xcode-ws.log | grep -E "error:|warning:|ARCHIVE|BUILD" || true
          ls "$RUNNER_TEMP/WhoamiSecBusiness.xcarchive" && echo "Archive OK" || (cat /tmp/xcode-ws.log; exit 1)

      - name: Package WHOAMISEC Business IPA
        run: |
          APP=$(find "$RUNNER_TEMP/WhoamiSecBusiness.xcarchive/Products" -name "*.app" | head -1)
          mkdir -p /tmp/payload_ws/Payload
          cp -r "$APP" "/tmp/payload_ws/Payload/WHOAMISEC Business.app"
          cd /tmp/payload_ws
          zip -r "$GITHUB_WORKSPACE/WHOAMISEC-Business-v16.ipa" Payload/
          echo "IPA: $(du -sh $GITHUB_WORKSPACE/WHOAMISEC-Business-v16.ipa)"

      # ════════════════════════════════════════════════════════
      # IPA 3 — CICADA 3301
      # ════════════════════════════════════════════════════════
      - name: Init Capacitor — CICADA 3301 iOS
        run: |
          cp cicada-omni-app.html apk-build/www/index.html
          cp cicada-sound.mp3     apk-build/www/ 2>/dev/null || true

          cd apk-build
          rm -rf ios node_modules

          npm install --save-dev \
            @capacitor/cli@latest \
            @capacitor/core@latest \
            @capacitor/ios@latest

          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.cicada3301.omni",
            "appName": "CICADA 3301",
            "webDir": "www",
            "server": {"iosScheme": "https"}
          }
          EOF

          ./node_modules/.bin/cap add ios
          ./node_modules/.bin/cap sync ios

      - name: Patch iOS deployment target — CICADA 3301
        working-directory: apk-build
        run: |
          find ios -name "project.pbxproj" -exec \
            perl -pi -e 's/IPHONEOS_DEPLOYMENT_TARGET = [\d.]+/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' {} \;

      - name: Set CICADA 3301 iOS app icon
        working-directory: apk-build
        run: |
          ICON="${{ github.workspace }}/cicada-icon.png"
          ICON_DIR="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$ICON_DIR"
          # sips is macOS built-in — no pip install needed
          for px in 20 29 40 58 60 76 80 87 120 152 167 180 1024; do
            sips -z $px $px "$ICON" --out "$ICON_DIR/cicada_${px}x${px}.png" 2>/dev/null
          done
          cat > "$ICON_DIR/Contents.json" << 'CONTENTS'
          {
            "images": [
              {"filename":"cicada_20x20.png",   "idiom":"iphone","scale":"1x","size":"20x20"},
              {"filename":"cicada_40x40.png",   "idiom":"iphone","scale":"2x","size":"20x20"},
              {"filename":"cicada_60x60.png",   "idiom":"iphone","scale":"3x","size":"20x20"},
              {"filename":"cicada_29x29.png",   "idiom":"iphone","scale":"1x","size":"29x29"},
              {"filename":"cicada_58x58.png",   "idiom":"iphone","scale":"2x","size":"29x29"},
              {"filename":"cicada_87x87.png",   "idiom":"iphone","scale":"3x","size":"29x29"},
              {"filename":"cicada_40x40.png",   "idiom":"iphone","scale":"1x","size":"40x40"},
              {"filename":"cicada_80x80.png",   "idiom":"iphone","scale":"2x","size":"40x40"},
              {"filename":"cicada_120x120.png", "idiom":"iphone","scale":"3x","size":"40x40"},
              {"filename":"cicada_120x120.png", "idiom":"iphone","scale":"2x","size":"60x60"},
              {"filename":"cicada_180x180.png", "idiom":"iphone","scale":"3x","size":"60x60"},
              {"filename":"cicada_76x76.png",   "idiom":"ipad",  "scale":"1x","size":"76x76"},
              {"filename":"cicada_152x152.png", "idiom":"ipad",  "scale":"2x","size":"76x76"},
              {"filename":"cicada_167x167.png", "idiom":"ipad",  "scale":"2x","size":"83.5x83.5"},
              {"filename":"cicada_1024x1024.png","idiom":"ios-marketing","scale":"1x","size":"1024x1024"}
            ],
            "info": {"author":"whoamisec","version":1}
          }
          CONTENTS
          echo "CICADA iOS icons installed via sips"

      - name: Build archive — CICADA 3301
        working-directory: apk-build/ios/App
        run: |
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/Cicada3301.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            clean archive 2>&1 | tee /tmp/xcode-c3.log | grep -E "error:|warning:|ARCHIVE|BUILD" || true
          ls "$RUNNER_TEMP/Cicada3301.xcarchive" && echo "Archive OK" || (cat /tmp/xcode-c3.log; exit 1)

      - name: Package CICADA 3301 IPA
        run: |
          APP=$(find "$RUNNER_TEMP/Cicada3301.xcarchive/Products" -name "*.app" | head -1)
          mkdir -p /tmp/payload_c3/Payload
          cp -r "$APP" "/tmp/payload_c3/Payload/CICADA 3301.app"
          cd /tmp/payload_c3
          zip -r "$GITHUB_WORKSPACE/CICADA-3301.ipa" Payload/
          echo "IPA: $(du -sh $GITHUB_WORKSPACE/CICADA-3301.ipa)"

      # ════════════════════════════════════════════════════════
      # Release
      # ════════════════════════════════════════════════════════
      - name: Upload IPAs to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-${{ github.run_number }}
          name: "WhoamiSec iOS IPAs — Build #${{ github.run_number }}"
          body: |
            ## WhoamiSec iOS Build #${{ github.run_number }} (unsigned — sideload)

            | File | Description |
            |------|-------------|
            | `JARVIS-MIND-v3.ipa` | JARVIS MIND — VPS, 2700 agents, Commander, SSH, Plans, AI Studio |
            | `WHOAMISEC-Business-v16.ipa` | Business — XMR Mining, Monero, Plans, AI Studio, VS Code |
            | `CICADA-3301.ipa` | CICADA 3301 — Puzzle platform, matrix UI, XMR rewards, Telegram |

            ### Compatibility — ALL 3 IPAs
            - **iOS 13.0+** — iPhone 6s and newer, ALL iPads
            - **arm64** universal binary

            ### Install (no App Store needed)
            | Tool | Link | Cost |
            |------|------|------|
            | **AltStore** | altstore.io | Free |
            | **Sideloadly** | sideloadly.io | Free |
            | **TrollStore** | GitHub | Free (iOS 14-16.7) |

            > Source code, SDK and agent configs NOT included in any IPA.
          files: |
            JARVIS-MIND-v3.ipa
            WHOAMISEC-Business-v16.ipa
            CICADA-3301.ipa
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
