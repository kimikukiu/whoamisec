name: Build APKs

on:
  push:
    branches: [main]
    paths:
      - 'jarvis-mind-app.html'
      - 'whoamisec-business-app.html'
      - 'manifest.json'
      - 'sw.js'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Accept licenses
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools" 2>/dev/null || true

      - name: Generate keystore
        run: |
          STOREPASS="${STOREPASS:-WhoamiSec2026}"
          keytool -genkeypair -v -keystore whoamisec.keystore -alias whoamisec \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$STOREPASS" -keypass "$STOREPASS" \
            -dname "CN=WhoamiSec,OU=JARVIS,O=WhoamiSec,L=Bucharest,ST=BU,C=RO"

      - name: Create patcher script
        run: |
          cat > /tmp/patch.py << 'SCRIPT'
          import sys, re
          f = sys.argv[1]
          c = open(f).read()
          if 'signingConfigs' not in c:
              sc = """\
          signingConfigs {
              release {
                  storeFile file('whoamisec.keystore')
                  storePassword System.getenv('KS_PASS') ?: 'WhoamiSec2026'
                  keyAlias 'whoamisec'
                  keyPassword System.getenv('KS_PASS') ?: 'WhoamiSec2026'
              }
          }"""
              c = c.replace('buildTypes {', sc + '\nbuildTypes {')
              if 'signingConfig signingConfigs.release' not in c:
                  c = c.replace('release {', 'release {\n            signingConfig signingConfigs.release')
          for pat, repl in [('minSdkVersion\\s+\\d+', 'minSdkVersion 23'), ('targetSdkVersion\\s+\\d+', 'targetSdkVersion 34'), ('compileSdkVersion\\s+\\d+', 'compileSdkVersion 34')]:
              c = re.sub(pat, repl, c)
          open(f, 'w').write(c)
          print('Patched OK')
          SCRIPT

      # ══════════════════════════════════════════
      # APK 1 — JARVIS MIND v3
      # ══════════════════════════════════════════
      - name: Init JARVIS MIND
        run: |
          mkdir -p apk-build/www
          cp jarvis-mind-app.html apk-build/www/index.html
          cp manifest.json apk-build/www/ 2>/dev/null || true
          cp sw.js apk-build/www/ 2>/dev/null || true
          cd apk-build
          echo '{"name":"jarvis-mind","version":"3.0","scripts":{"build":"echo ok"}}' > package.json
          npm install --save-dev @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6 2>&1 | tail -3
          echo '{"appId":"com.whoamisec.jarvis","appName":"JARVIS MIND","webDir":"www","server":{"androidScheme":"https"},"android":{"allowMixedContent":true}}' > capacitor.config.json
          npx cap add android 2>&1 | tail -3
          npx cap sync android 2>&1 | tail -3

      - name: Patch + Build JARVIS MIND
        env:
          KS_PASS: "WhoamiSec2026"
        run: |
          cp whoamisec.keystore apk-build/android/app/whoamisec.keystore
          python3 /tmp/patch.py apk-build/android/app/build.gradle
          cat apk-build/android/app/build.gradle | grep -A2 signingConfigs || echo "No signing found"
          cd apk-build/android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon 2>&1 | tail -30
          echo "EXIT: $?"
          find . -name "*.apk" -type f

      - name: Collect JARVIS MIND APK
        run: |
          APK=$(find apk-build/android -name "*.apk" -type f | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" JARVIS-MIND-v3.apk
            echo "Done: $(du -sh JARVIS-MIND-v3.apk)"
          else
            echo "No APK built, trying debug..."
            cd apk-build/android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon 2>&1 | tail -20
            APK=$(find . -name "*.apk" -type f | head -1)
            if [ -n "$APK" ]; then
              cp "$APK" ../../JARVIS-MIND-v3.apk
              echo "Debug APK: $(du -sh ../../JARVIS-MIND-v3.apk)"
            else
              echo "FAIL: No APK at all"
              exit 1
            fi
          fi

      # ══════════════════════════════════════════
      # APK 2 — WHOAMISEC Business v16
      # ══════════════════════════════════════════
      - name: Init WHOAMISEC Business
        run: |
          cp whoamisec-business-app.html apk-build/www/index.html
          cd apk-build
          rm -rf android node_modules capacitor.config.json package-lock.json
          npm install --save-dev @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6 2>&1 | tail -3
          echo '{"appId":"com.whoamisec.business","appName":"WHOAMISEC Business","webDir":"www","server":{"androidScheme":"https"},"android":{"allowMixedContent":true}}' > capacitor.config.json
          npx cap add android 2>&1 | tail -3
          npx cap sync android 2>&1 | tail -3

      - name: Patch + Build WHOAMISEC Business
        env:
          KS_PASS: "WhoamiSec2026"
        run: |
          cp whoamisec.keystore apk-build/android/app/whoamisec.keystore
          python3 /tmp/patch.py apk-build/android/app/build.gradle
          cd apk-build/android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon 2>&1 | tail -30
          echo "EXIT: $?"
          find . -name "*.apk" -type f

      - name: Collect WHOAMISEC Business APK
        run: |
          APK=$(find apk-build/android -name "*.apk" -type f | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" WHOAMISEC-Business-v16.apk
            echo "Done: $(du -sh WHOAMISEC-Business-v16.apk)"
          else
            echo "FAIL: No APK"
            exit 1
          fi

      # ══════════════════════════════════════════
      # Release
      # ══════════════════════════════════════════
      - name: Upload APKs to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "WhoamiSec APKs Build #${{ github.run_number }}"
          body: |
            APKs built with Capacitor v6 + Gradle
          files: |
            JARVIS-MIND-v3.apk
            WHOAMISEC-Business-v16.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
