name: Build APKs

on:
  push:
    branches: [main]
    paths:
      - 'jarvis-mind-app.html'
      - 'whoamisec-business-app.html'
      - 'manifest.json'
      - 'sw.js'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      KS_PASS: WhoamiSecAdmin2026
      KS_ALIAS: whoamisec

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      # ── Signing keystore ──────────────────────────────────────
      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore "$GITHUB_WORKSPACE/whoamisec.keystore" \
            -alias $KS_ALIAS \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass "$KS_PASS" \
            -keypass "$KS_PASS" \
            -dname "CN=WhoamiSec,OU=JARVIS,O=WhoamiSec,L=Online,ST=Online,C=US"

      # ── Shared Gradle patcher ─────────────────────────────────
      - name: Write Gradle patcher
        run: |
          cat > "$GITHUB_WORKSPACE/patch_gradle.py" << 'PY'
          import re, sys, os

          gradle = "android/app/build.gradle"
          content = open(gradle).read()

          # Fix SDK versions
          for old, new in [
              (r'minSdkVersion\s+\d+',    'minSdkVersion 23'),
              (r'minSdk\s+\d+',           'minSdk 23'),
              (r'targetSdkVersion\s+\d+', 'targetSdkVersion 34'),
              (r'targetSdk\s+\d+',        'targetSdk 34'),
              (r'compileSdkVersion\s+\d+','compileSdkVersion 34'),
              (r'compileSdk\s+\d+',       'compileSdk 34'),
          ]:
              content = re.sub(old, new, content)

          # Remove any existing splits block
          content = re.sub(r'splits\s*\{[^}]*(?:\{[^}]*\}[^}]*)?\}', '', content, flags=re.DOTALL)

          # Inject universal ABI splits before the last closing brace of android {}
          universal = '''
              splits {
                  abi {
                      enable true
                      reset()
                      include "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
                      universalApk true
                  }
              }
          '''
          idx = content.find('android {')
          if idx >= 0:
              depth = 0
              for i in range(idx, len(content)):
                  if content[i] == '{': depth += 1
                  elif content[i] == '}':
                      depth -= 1
                      if depth == 0:
                          content = content[:i] + universal + content[i:]
                          break

          open(gradle, 'w').write(content)
          print("Gradle patched OK")
          PY

      # ════════════════════════════════════════════════════════
      # APK 1 — JARVIS MIND v3
      # ════════════════════════════════════════════════════════
      - name: Init Capacitor — JARVIS MIND
        run: |
          mkdir -p apk-build/www
          cp jarvis-mind-app.html apk-build/www/index.html
          cp manifest.json        apk-build/www/ 2>/dev/null || true
          cp sw.js                apk-build/www/ 2>/dev/null || true

          cd apk-build
          cat > package.json << 'EOF'
          {"name":"jarvis-mind","version":"3.0.0","scripts":{"build":"echo ok"}}
          EOF

          npm install --save-dev \
            @capacitor/cli@latest \
            @capacitor/core@latest \
            @capacitor/android@latest

          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.whoamisec.jarvis",
            "appName": "JARVIS MIND",
            "webDir": "www",
            "server": {"androidScheme": "https"}
          }
          EOF

          ./node_modules/.bin/cap add android
          ./node_modules/.bin/cap sync android

      - name: Patch Gradle — JARVIS MIND
        working-directory: apk-build
        run: python3 "$GITHUB_WORKSPACE/patch_gradle.py"

      - name: Build JARVIS MIND release APK
        working-directory: apk-build/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Sign JARVIS MIND APK
        run: |
          BUILD_TOOLS=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)
          APK_IN=$(find apk-build/android/app/build/outputs/apk/release \
                   -name "*universal*.apk" 2>/dev/null | head -1)
          [ -z "$APK_IN" ] && APK_IN=$(find apk-build/android/app/build/outputs/apk/release \
                                        -name "*.apk" | head -1)
          echo "Signing: $APK_IN"
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/zipalign" -v 4 "$APK_IN" jm-aligned.apk
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner" sign \
            --ks "$GITHUB_WORKSPACE/whoamisec.keystore" \
            --ks-pass pass:"$KS_PASS" \
            --key-pass pass:"$KS_PASS" \
            --ks-key-alias "$KS_ALIAS" \
            --out JARVIS-MIND-v3.apk \
            jm-aligned.apk
          echo "Size: $(du -sh JARVIS-MIND-v3.apk)"

      # ════════════════════════════════════════════════════════
      # APK 2 — WHOAMISEC Business v16
      # ════════════════════════════════════════════════════════
      - name: Init Capacitor — WHOAMISEC Business
        run: |
          cp whoamisec-business-app.html apk-build/www/index.html

          cd apk-build
          rm -rf android node_modules

          npm install --save-dev \
            @capacitor/cli@latest \
            @capacitor/core@latest \
            @capacitor/android@latest

          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.whoamisec.business",
            "appName": "WHOAMISEC Business",
            "webDir": "www",
            "server": {"androidScheme": "https"}
          }
          EOF

          ./node_modules/.bin/cap add android
          ./node_modules/.bin/cap sync android

      - name: Patch Gradle — WHOAMISEC Business
        working-directory: apk-build
        run: python3 "$GITHUB_WORKSPACE/patch_gradle.py"

      - name: Build WHOAMISEC Business release APK
        working-directory: apk-build/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Sign WHOAMISEC Business APK
        run: |
          BUILD_TOOLS=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)
          APK_IN=$(find apk-build/android/app/build/outputs/apk/release \
                   -name "*universal*.apk" 2>/dev/null | head -1)
          [ -z "$APK_IN" ] && APK_IN=$(find apk-build/android/app/build/outputs/apk/release \
                                        -name "*.apk" | head -1)
          echo "Signing: $APK_IN"
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/zipalign" -v 4 "$APK_IN" ws-aligned.apk
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner" sign \
            --ks "$GITHUB_WORKSPACE/whoamisec.keystore" \
            --ks-pass pass:"$KS_PASS" \
            --key-pass pass:"$KS_PASS" \
            --ks-key-alias "$KS_ALIAS" \
            --out WHOAMISEC-Business-v16.apk \
            ws-aligned.apk
          echo "Size: $(du -sh WHOAMISEC-Business-v16.apk)"

      # ════════════════════════════════════════════════════════
      # Release
      # ════════════════════════════════════════════════════════
      - name: Upload APKs to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "WhoamiSec APKs — Build #${{ github.run_number }}"
          body: |
            ## WhoamiSec APK Build #${{ github.run_number }}

            | File | Description |
            |------|-------------|
            | `JARVIS-MIND-v3.apk` | JARVIS MIND Commander — VPS, 2700 agents, AI, SSH, Plans |
            | `WHOAMISEC-Business-v16.apk` | Business — XMR Mining, Monero, Plans, Invite Friend |

            ### Compatibility
            - Android **6.0+** (API 23)
            - **armeabi-v7a** (32-bit ARM) + **arm64-v8a** (64-bit ARM) + **x86** + **x86_64**
            - Universal APK — one file, installs on any Android

            ### Install
            1. Download APK
            2. Settings → Security → **Allow unknown sources**
            3. Tap APK → Install

            > Source code, SDK, swarm tools and agent configs NOT included in APK.
          files: |
            JARVIS-MIND-v3.apk
            WHOAMISEC-Business-v16.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
