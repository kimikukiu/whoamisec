name: Build APKs

on:
  push:
    branches: [main]
    paths:
      - 'jarvis-mind-app.html'
      - 'whoamisec-business-app.html'
      - 'manifest.json'
      - 'sw.js'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses & install SDK
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools" 2>/dev/null || true

      - name: Generate signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore /tmp/whoamisec.keystore \
            -alias whoamisec \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass WhoamiSec2026 \
            -keypass WhoamiSec2026 \
            -dname "CN=WhoamiSec,OU=JARVIS,O=WhoamiSec,L=Bucharest,ST=BU,C=RO"

      # ════════════════════════════════════════════════════════
      # APK 1 — JARVIS MIND v3
      # ════════════════════════════════════════════════════════
      - name: Init Capacitor — JARVIS MIND
        run: |
          set -e
          mkdir -p apk-build/www
          cp jarvis-mind-app.html apk-build/www/index.html
          cp manifest.json apk-build/www/ 2>/dev/null || true
          cp sw.js apk-build/www/ 2>/dev/null || true
          cd apk-build
          echo '{"name":"jarvis-mind","version":"3.0","scripts":{"build":"echo ok"}}' > package.json
          npm install --save-dev @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.whoamisec.jarvis",
            "appName": "JARVIS MIND",
            "webDir": "www",
            "server": { "androidScheme": "https" },
            "android": { "allowMixedContent": true }
          }
          EOF
          npx cap add android
          npx cap sync android

      - name: Build JARVIS MIND APK
        working-directory: apk-build/android
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/jm-gradle.log
          echo "Gradle exit code: $?"

      - name: Sign JARVIS MIND APK
        run: |
          set -e
          BUILD_TOOLS=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)
          APK=$(find apk-build/android/app/build/outputs -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK built!"
            cat /tmp/jm-gradle.log
            exit 1
          fi
          echo "Found APK: $APK ($(du -sh "$APK" | cut -f1))"
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/zipalign" -f 4 "$APK" /tmp/jm-aligned.apk
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner" sign \
            --ks /tmp/whoamisec.keystore \
            --ks-pass pass:WhoamiSec2026 \
            --key-pass pass:WhoamiSec2026 \
            --ks-key-alias whoamisec \
            --out "$GITHUB_WORKSPACE/JARVIS-MIND-v3.apk" \
            /tmp/jm-aligned.apk
          echo "SIGNED: $(du -sh "$GITHUB_WORKSPACE/JARVIS-MIND-v3.apk")"

      # ════════════════════════════════════════════════════════
      # APK 2 — WHOAMISEC Business v16
      # ════════════════════════════════════════════════════════
      - name: Init Capacitor — WHOAMISEC Business
        run: |
          set -e
          cp whoamisec-business-app.html apk-build/www/index.html
          cd apk-build
          rm -rf android node_modules capacitor.config.json package-lock.json
          echo '{"name":"whoamisec-business","version":"16.0","scripts":{"build":"echo ok"}}' > package.json
          npm install --save-dev @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.whoamisec.business",
            "appName": "WHOAMISEC Business",
            "webDir": "www",
            "server": { "androidScheme": "https" },
            "android": { "allowMixedContent": true }
          }
          EOF
          npx cap add android
          npx cap sync android

      - name: Build WHOAMISEC Business APK
        working-directory: apk-build/android
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/ws-gradle.log
          echo "Gradle exit code: $?"

      - name: Sign WHOAMISEC Business APK
        run: |
          set -e
          BUILD_TOOLS=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)
          APK=$(find apk-build/android/app/build/outputs -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK built!"
            cat /tmp/ws-gradle.log
            exit 1
          fi
          echo "Found APK: $APK ($(du -sh "$APK" | cut -f1))"
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/zipalign" -f 4 "$APK" /tmp/ws-aligned.apk
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner" sign \
            --ks /tmp/whoamisec.keystore \
            --ks-pass pass:WhoamiSec2026 \
            --key-pass pass:WhoamiSec2026 \
            --ks-key-alias whoamisec \
            --out "$GITHUB_WORKSPACE/WHOAMISEC-Business-v16.apk" \
            /tmp/ws-aligned.apk
          echo "SIGNED: $(du -sh "$GITHUB_WORKSPACE/WHOAMISEC-Business-v16.apk")"

      # ════════════════════════════════════════════════════════
      # Release
      # ════════════════════════════════════════════════════════
      - name: Upload APKs to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "WhoamiSec APKs Build #${{ github.run_number }}"
          body: |
            ## WhoamiSec APK Build #${{ github.run_number }}

            | File | Description |
            |------|-------------|
            | `JARVIS-MIND-v3.apk` | JARVIS MIND — VPS, 2700 agents, Commander, Plans |
            | `WHOAMISEC-Business-v16.apk` | Business — XMR Mining, Monero, Plans |

            - Android **6.0+** (API 23+) — Universal APK — Capacitor v6
          files: |
            JARVIS-MIND-v3.apk
            WHOAMISEC-Business-v16.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
