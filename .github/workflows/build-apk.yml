name: Build APKs

on:
  push:
    branches: [main]
    paths:
      - 'jarvis-mind-app.html'
      - 'whoamisec-business-app.html'
      - 'manifest.json'
      - 'sw.js'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30

    env:
      KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
      KS_ALIAS: whoamisec

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses & install build-tools
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools" 2>/dev/null || true

      - name: Generate signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore whoamisec.keystore \
            -alias whoamisec \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass "${{ secrets.KEYSTORE_PASSWORD || 'WhoamiSec2026' }}" \
            -keypass "${{ secrets.KEYSTORE_PASSWORD || 'WhoamiSec2026' }}" \
            -dname "CN=WhoamiSec,OU=JARVIS,O=WhoamiSec,L=Bucharest,ST=BU,C=RO"

      - name: Create Gradle patcher script
        run: |
          cat > patch_gradle.py << 'PYEOF'
          import sys, re
          f = sys.argv[1]
          c = open(f).read()
          if 'signingConfigs' not in c:
              c = c.replace('buildTypes {', 'signingConfigs {\n    release {\n        storeFile file("$GITHUB_WORKSPACE/whoamisec.keystore")\n        storePassword "$KS_PASS"\n        keyAlias "whoamisec"\n        keyPassword "$KS_PASS"\n    }\n}\nbuildTypes {')
              if 'signingConfig signingConfigs.release' not in c:
                  c = c.replace('release {', 'release {\n            signingConfig signingConfigs.release')
          c = re.sub(r'minSdkVersion\s+\d+', 'minSdkVersion 23', c)
          c = re.sub(r'targetSdkVersion\s+\d+', 'targetSdkVersion 34', c)
          c = re.sub(r'compileSdkVersion\s+\d+', 'compileSdkVersion 34', c)
          open(f, 'w').write(c)
          print('Gradle patched')
          PYEOF
          echo "Patcher script created"

      # ════════════════════════════════════════════════════════
      # APK 1 — JARVIS MIND v3
      # ════════════════════════════════════════════════════════
      - name: Init Capacitor — JARVIS MIND
        run: |
          mkdir -p apk-build/www
          cp jarvis-mind-app.html apk-build/www/index.html
          cp manifest.json apk-build/www/ 2>/dev/null || true
          cp sw.js apk-build/www/ 2>/dev/null || true
          cd apk-build
          echo '{"name":"jarvis-mind","version":"3.0.0","scripts":{"build":"echo ok"}}' > package.json
          npm install --save-dev @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6 2>&1 | tail -5
          echo '{"appId":"com.whoamisec.jarvis","appName":"JARVIS MIND","webDir":"www","server":{"androidScheme":"https"},"android":{"allowMixedContent":true}}' > capacitor.config.json
          npx cap add android 2>&1 | tail -5
          npx cap sync android 2>&1 | tail -5

      - name: Patch Gradle — JARVIS MIND
        run: |
          export GITHUB_WORKSPACE="$PWD"
          export KS_PASS="${{ secrets.KEYSTORE_PASSWORD || 'WhoamiSec2026' }}"
          python3 patch_gradle.py apk-build/android/app/build.gradle

      - name: Build JARVIS MIND APK
        working-directory: apk-build/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Collect JARVIS MIND APK
        run: |
          find apk-build/android -name "*.apk" -type f 2>/dev/null
          FOUND=""
          for dir in apk-build/android/app/build/outputs/apk/release apk-build/android/app/build/outputs/apk/debug apk-build/android/app/build/outputs/apk apk-build/android/app/build; do
            APK=$(find "$dir" -name "*.apk" -type f 2>/dev/null | head -1)
            if [ -n "$APK" ]; then
              cp "$APK" JARVIS-MIND-v3.apk
              FOUND=yes
              break
            fi
          done
          if [ -z "$FOUND" ]; then
            APK=$(find . -maxdepth 10 -name "*.apk" -type f 2>/dev/null | grep -v keystore | head -1)
            if [ -n "$APK" ]; then
              cp "$APK" JARVIS-MIND-v3.apk
              FOUND=yes
            fi
          fi
          if [ "$FOUND" = "yes" ] && [ -f "JARVIS-MIND-v3.apk" ]; then
            echo "APK ready: $(du -sh JARVIS-MIND-v3.apk)"
          else
            echo "FAIL: No APK produced by Gradle"
            exit 1
          fi

      # ════════════════════════════════════════════════════════
      # APK 2 — WHOAMISEC Business v16
      # ════════════════════════════════════════════════════════
      - name: Init Capacitor — WHOAMISEC Business
        run: |
          cp whoamisec-business-app.html apk-build/www/index.html
          cd apk-build
          rm -rf android node_modules capacitor.config.json package-lock.json
          npm install --save-dev @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6 2>&1 | tail -5
          echo '{"appId":"com.whoamisec.business","appName":"WHOAMISEC Business","webDir":"www","server":{"androidScheme":"https"},"android":{"allowMixedContent":true}}' > capacitor.config.json
          npx cap add android 2>&1 | tail -5
          npx cap sync android 2>&1 | tail -5

      - name: Patch Gradle — WHOAMISEC Business
        run: |
          export GITHUB_WORKSPACE="$PWD"
          export KS_PASS="${{ secrets.KEYSTORE_PASSWORD || 'WhoamiSec2026' }}"
          python3 patch_gradle.py apk-build/android/app/build.gradle

      - name: Build WHOAMISEC Business APK
        working-directory: apk-build/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Collect WHOAMISEC Business APK
        run: |
          find apk-build/android -name "*.apk" -type f 2>/dev/null
          FOUND=""
          for dir in apk-build/android/app/build/outputs/apk/release apk-build/android/app/build/outputs/apk/debug apk-build/android/app/build/outputs/apk apk-build/android/app/build; do
            APK=$(find "$dir" -name "*.apk" -type f 2>/dev/null | head -1)
            if [ -n "$APK" ]; then
              cp "$APK" WHOAMISEC-Business-v16.apk
              FOUND=yes
              break
            fi
          done
          if [ -z "$FOUND" ]; then
            APK=$(find . -maxdepth 10 -name "*.apk" -type f 2>/dev/null | grep -v keystore | head -1)
            if [ -n "$APK" ]; then
              cp "$APK" WHOAMISEC-Business-v16.apk
              FOUND=yes
            fi
          fi
          if [ "$FOUND" = "yes" ] && [ -f "WHOAMISEC-Business-v16.apk" ]; then
            echo "APK ready: $(du -sh WHOAMISEC-Business-v16.apk)"
          else
            echo "FAIL: No APK produced"
            exit 1
          fi

      # ════════════════════════════════════════════════════════
      # Release
      # ════════════════════════════════════════════════════════
      - name: Upload APKs to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "WhoamiSec APKs — Build #${{ github.run_number }}"
          body: |
            ## WhoamiSec APK Build #${{ github.run_number }}
            | File | Description |
            |------|-------------|
            | `JARVIS-MIND-v3.apk` | JARVIS MIND — VPS, 2700 agents |
            | `WHOAMISEC-Business-v16.apk` | Business — XMR Mining, Monero |
          files: |
            JARVIS-MIND-v3.apk
            WHOAMISEC-Business-v16.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
