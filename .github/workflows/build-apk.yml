name: Build APKs

on:
  push:
    branches: [main]
    paths:
      - 'jarvis-mind-app.html'
      - 'whoamisec-business-app.html'
      - 'manifest.json'
      - 'sw.js'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Accept licenses
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools" 2>/dev/null || true

      - name: Generate keystore
        run: |
          keytool -genkeypair -v -keystore whoamisec.keystore -alias whoamisec \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass WhoamiSec2026 -keypass WhoamiSec2026 \
            -dname "CN=WhoamiSec,OU=JARVIS,O=WhoamiSec,L=Bucharest,ST=BU,C=RO"

      - name: Init JARVIS MIND
        run: |
          mkdir -p apk-build/www
          cp jarvis-mind-app.html apk-build/www/index.html
          cp manifest.json apk-build/www/ 2>/dev/null || true
          cp sw.js apk-build/www/ 2>/dev/null || true
          cd apk-build
          echo '{"name":"jarvis-mind","version":"3.0","scripts":{"build":"echo ok"}}' > package.json
          npm install --save-dev @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6 2>&1 | tail -3
          echo '{"appId":"com.whoamisec.jarvis","appName":"JARVIS MIND","webDir":"www","server":{"androidScheme":"https"},"android":{"allowMixedContent":true}}' > capacitor.config.json
          npx cap add android 2>&1 | tail -3
          npx cap sync android 2>&1 | tail -3

      - name: Build JARVIS MIND
        run: |
          cd apk-build/android
          chmod +x gradlew
          ./gradlew assembleDebug 2>&1 | tee /tmp/jm.log
          echo "EXIT=$?"
          find . -name "*.apk" -type f
          APK=$(find . -name "*.apk" -type f | head -1)
          if [ -n "$APK" ]; then
            BUILD_TOOLS=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)
            echo "Build tools: $BUILD_TOOLS"
            "$ANDROID_HOME/build-tools/$BUILD_TOOLS/zipalign" -f 4 "$APK" /tmp/jm-aligned.apk
            "$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner" sign \
              --ks "$GITHUB_WORKSPACE/whoamisec.keystore" \
              --ks-pass pass:WhoamiSec2026 --key-pass pass:WhoamiSec2026 \
              --ks-key-alias whoamisec \
              --out "$GITHUB_WORKSPACE/JARVIS-MIND-v3.apk" /tmp/jm-aligned.apk
            echo "SIGNED: $(du -sh $GITHUB_WORKSPACE/JARVIS-MIND-v3.apk)"
          else
            echo "BUILD FAILED"
            cat /tmp/jm.log
            exit 1
          fi

      - name: Init WHOAMISEC Business
        run: |
          cp whoamisec-business-app.html apk-build/www/index.html
          cd apk-build
          rm -rf android node_modules capacitor.config.json package-lock.json
          npm install --save-dev @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6 2>&1 | tail -3
          echo '{"appId":"com.whoamisec.business","appName":"WHOAMISEC Business","webDir":"www","server":{"androidScheme":"https"},"android":{"allowMixedContent":true}}' > capacitor.config.json
          npx cap add android 2>&1 | tail -3
          npx cap sync android 2>&1 | tail -3

      - name: Build WHOAMISEC Business
        run: |
          cd apk-build/android
          chmod +x gradlew
          ./gradlew assembleDebug 2>&1 | tee /tmp/ws.log
          echo "EXIT=$?"
          find . -name "*.apk" -type f
          APK=$(find . -name "*.apk" -type f | head -1)
          if [ -n "$APK" ]; then
            BUILD_TOOLS=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)
            "$ANDROID_HOME/build-tools/$BUILD_TOOLS/zipalign" -f 4 "$APK" /tmp/ws-aligned.apk
            "$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner" sign \
              --ks "$GITHUB_WORKSPACE/whoamisec.keystore" \
              --ks-pass pass:WhoamiSec2026 --key-pass pass:WhoamiSec2026 \
              --ks-key-alias whoamisec \
              --out "$GITHUB_WORKSPACE/WHOAMISEC-Business-v16.apk" /tmp/ws-aligned.apk
            echo "SIGNED: $(du -sh $GITHUB_WORKSPACE/WHOAMISEC-Business-v16.apk)"
          else
            echo "BUILD FAILED"
            cat /tmp/ws.log
            exit 1
          fi

      - name: Upload APKs to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "WhoamiSec APKs Build #${{ github.run_number }}"
          body: |
            APKs built with Capacitor v6, signed with apksigner
          files: |
            JARVIS-MIND-v3.apk
            WHOAMISEC-Business-v16.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
