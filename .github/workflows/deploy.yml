name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare site files
        run: |
          mkdir -p _site
          # Copy all HTML pages
          for f in index.html login.html dashboard.html admin.html jarvis.html \
                   mining.html cicada.html downloads.html \
                   jarvis-mind-app.html whoamisec-business-app.html; do
            [ -f "$f" ] && cp "$f" _site/ && echo "Copied $f"
          done
          # Copy static assets
          for f in manifest.json sw.js cicada-sound.mp3; do
            [ -f "$f" ] && cp "$f" _site/ && echo "Copied $f"
          done
          echo "=== Site ready ==="
          ls -la _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
