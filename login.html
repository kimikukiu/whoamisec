<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHOAMI.SEC | Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --green: #00ff41;
            --green-dim: #00cc33;
            --green-dark: #008822;
            --green-glow: rgba(0,255,65,0.3);
            --bg-dark: #0a0a0a;
            --bg-mid: #1a1a2e;
            --bg-card: rgba(10,15,10,0.9);
            --border: rgba(0,255,65,0.2);
            --text-dim: #66ff88;
            --text-darker: #339955;
            --red: #ff0040;
        }
        body {
            font-family: 'Fira Code', monospace;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-mid) 50%, #0d1117 100%);
            color: var(--green);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Matrix background */
        .matrix-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        .matrix-column {
            position: absolute;
            top: -100%;
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            color: var(--green);
            opacity: 0.1;
            writing-mode: vertical-rl;
            animation: matrixFall linear infinite;
        }
        @keyframes matrixFall {
            from { transform: translateY(-100%); }
            to { transform: translateY(200vh); }
        }

        .login-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,255,65,0.05);
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--green), transparent);
        }
        .login-card::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--green), transparent);
        }

        .brand {
            text-align: center;
            margin-bottom: 30px;
        }
        .brand-logo {
            font-size: 2rem;
            font-weight: 700;
            text-shadow: 0 0 20px var(--green-glow);
            letter-spacing: 4px;
        }
        .brand-logo span { color: var(--red); }
        .brand-sub {
            font-size: 0.7rem;
            color: var(--text-darker);
            letter-spacing: 3px;
            margin-top: 6px;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: 0.8rem;
            letter-spacing: 2px;
            cursor: pointer;
            color: var(--text-darker);
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
            font-family: 'Fira Code', monospace;
        }
        .tab.active {
            color: var(--green);
            border-bottom-color: var(--green);
            text-shadow: 0 0 10px var(--green-glow);
        }
        .tab:hover:not(.active) { color: var(--green-dim); }

        .form-group {
            margin-bottom: 16px;
        }
        .form-label {
            display: block;
            font-size: 0.7rem;
            color: var(--text-darker);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            background: rgba(0,0,0,0.5);
            color: var(--green);
            border: 1px solid var(--border);
            border-radius: 6px;
            outline: none;
            transition: all 0.3s;
        }
        .form-input:focus {
            border-color: var(--green);
            box-shadow: 0 0 10px var(--green-glow);
        }
        .form-input::placeholder { color: var(--text-darker); }

        .btn-submit {
            width: 100%;
            padding: 14px;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 2px;
            background: var(--green);
            color: #000;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .btn-submit:hover {
            background: #33ff66;
            box-shadow: 0 0 30px var(--green-glow);
        }
        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-box {
            background: rgba(255,0,64,0.1);
            border: 1px solid rgba(255,0,64,0.3);
            border-radius: 6px;
            padding: 12px;
            font-size: 0.75rem;
            color: var(--red);
            margin-bottom: 16px;
            display: none;
        }
        .error-box.show { display: block; }

        .form-panel {
            display: none;
        }
        .form-panel.active { display: block; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 0.75rem;
            color: var(--text-darker);
            text-decoration: none;
            letter-spacing: 1px;
            transition: color 0.3s;
        }
        .back-link:hover { color: var(--green); }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 0.6rem;
            color: var(--text-darker);
            letter-spacing: 2px;
        }

        .status-dot {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 2s infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 var(--green-glow); }
            50% { opacity: 0.7; box-shadow: 0 0 0 6px transparent; }
        }
    </style>
</head>
<body>
    <div class="matrix-bg" id="matrix-bg"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="brand">
                <div class="brand-logo">WHOAMI<span>.SEC</span></div>
                <div class="brand-sub">JARVIS OMNI // ABLITERATED</div>
            </div>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')" id="tab-login">LOGIN</button>
                <button class="tab" onclick="switchTab('register')" id="tab-register">REGISTER</button>
            </div>

            <div class="error-box" id="error-box"></div>

            <!-- Login Form -->
            <div class="form-panel active" id="panel-login">
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-input" id="login-username" placeholder="Enter username" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" id="login-password" placeholder="Enter password" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn-submit" id="login-btn">AUTHENTICATE</button>
                </form>
            </div>

            <!-- Register Form -->
            <div class="form-panel" id="panel-register">
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-input" id="reg-username" placeholder="Choose username" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" id="reg-email" placeholder="Enter email" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" id="reg-password" placeholder="Choose password" required autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn-submit" id="reg-btn">CREATE ACCOUNT</button>
                </form>
            </div>
        </div>

        <a href="index.html" class="back-link">&#8592; BACK TO HOME</a>

        <div class="footer-text">
            <span class="status-dot"></span>
            SECURE CONNECTION | ZERO-KYC | MONERO ACCEPTED
        </div>
    </div>

    <script>
        const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:5001' : '';

        // Generate matrix columns
        (function generateMatrix() {
            const bg = document.getElementById('matrix-bg');
            const chars = 'WHOAMI01アイウエオカキクケコサシスセソ';
            for (let i = 0; i < 30; i++) {
                const col = document.createElement('div');
                col.className = 'matrix-column';
                col.style.left = Math.random() * 100 + '%';
                col.style.animationDuration = (5 + Math.random() * 15) + 's';
                col.style.animationDelay = Math.random() * 10 + 's';
                let text = '';
                for (let j = 0; j < 30; j++) {
                    text += chars[Math.floor(Math.random() * chars.length)] + '\n';
                }
                col.textContent = text;
                bg.appendChild(col);
            }
        })();

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('panel-' + tab).classList.add('active');
            hideError();
        }

        function showError(msg) {
            const box = document.getElementById('error-box');
            box.textContent = msg;
            box.classList.add('show');
        }
        function hideError() {
            document.getElementById('error-box').classList.remove('show');
        }

        async function handleLogin(e) {
            e.preventDefault();
            hideError();
            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.textContent = 'AUTHENTICATING...';

            try {
                const res = await fetch(API_BASE + '/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('login-username').value,
                        password: document.getElementById('login-password').value
                    })
                });
                const data = await res.json();
                if (res.ok && data.access_token) {
                    localStorage.setItem('whoamisec_token', data.access_token);
                    window.location.href = 'dashboard.html';
                } else {
                    showError(data.error || data.msg || 'Login failed');
                }
            } catch (e) {
                showError('Cannot connect to server. Make sure the backend is running.');
            }
            btn.disabled = false;
            btn.textContent = 'AUTHENTICATE';
        }

        async function handleRegister(e) {
            e.preventDefault();
            hideError();
            const btn = document.getElementById('reg-btn');
            btn.disabled = true;
            btn.textContent = 'CREATING...';

            try {
                const res = await fetch(API_BASE + '/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('reg-username').value,
                        email: document.getElementById('reg-email').value,
                        password: document.getElementById('reg-password').value
                    })
                });
                const data = await res.json();
                if (res.ok && data.access_token) {
                    localStorage.setItem('whoamisec_token', data.access_token);
                    window.location.href = 'dashboard.html';
                } else {
                    showError(data.error || data.msg || 'Registration failed');
                }
            } catch (e) {
                showError('Cannot connect to server. Make sure the backend is running.');
            }
            btn.disabled = false;
            btn.textContent = 'CREATE ACCOUNT';
        }

        // Check if already logged in
        if (localStorage.getItem('whoamisec_token')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
