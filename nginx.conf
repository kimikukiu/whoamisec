# ── WhoamiSec nginx — serves from Codespace (port 8080)
# All domains route here via Cloudflare Tunnel
server {
    listen 8080;
    server_name _;

    root /var/www/whoamisec;
    index index.html;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()";

    # ── Static HTML pages ─────────────────────────────────
    location = /         { try_files /index.html =404; }
    location = /login    { rewrite ^ /login.html; }
    location = /dashboard{ rewrite ^ /dashboard.html; }
    location = /admin    { rewrite ^ /admin.html; }
    location = /jarvis   { rewrite ^ /jarvis-mind-app.html; }
    location = /mining   { rewrite ^ /mining.html; }
    location = /cicada   { rewrite ^ /cicada.html; }
    location = /downloads{ rewrite ^ /downloads.html; }
    location = /apps/business  { rewrite ^ /whoamisec-business-app.html; }
    location = /apps/jarvis-mind { rewrite ^ /jarvis-mind-app.html; }

    # Serve .html files cleanly
    location ~* \.html$ { try_files $uri =404; }

    # ── APK downloads ─────────────────────────────────────
    location /apk/ {
        alias /var/apk/;
        autoindex on;
        autoindex_exact_size off;
        add_header Content-Disposition 'attachment';
        types { application/vnd.android.package-archive apk; }
    }

    # ── Flask API proxy ───────────────────────────────────
    location /api/ {
        proxy_pass http://api:5001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Health check ──────────────────────────────────────
    location = /health {
        proxy_pass http://api:5001/api/v1/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Static assets ─────────────────────────────────────
    location ~* \.(js|css|ico|png|jpg|mp3|json|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
}
