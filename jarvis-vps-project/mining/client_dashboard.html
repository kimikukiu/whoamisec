<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Dashboard - XMR-MINER-WHOAMI.SEC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            font-family: 'Courier New', monospace;
            color: #0f0;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; padding: 30px; border-bottom: 2px solid #0f0; margin-bottom: 30px; }
        .header h1 { font-size: 2em; animation: glow 2s infinite; }
        @keyframes glow { 0% { text-shadow: 0 0 5px #0f0; } 100% { text-shadow: 0 0 20px #0f0; } }
        .card { background: rgba(0,0,0,0.8); border: 1px solid #0f0; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat { background: rgba(0,0,0,0.6); padding: 20px; text-align: center; border-radius: 10px; }
        .stat-value { font-size: 2em; font-weight: bold; }
        input, select { background: #000; border: 1px solid #0f0; color: #0f0; padding: 10px; width: 100%; margin-bottom: 15px; font-family: monospace; }
        button { background: #0f0; color: #000; border: none; padding: 12px 24px; cursor: pointer; font-weight: bold; }
        button:hover { opacity: 0.8; }
        .address-box { background: #000; padding: 15px; border-radius: 5px; word-break: break-all; font-family: monospace; margin: 10px 0; }
        .success { background: rgba(0,255,0,0.2); border: 1px solid #0f0; padding: 10px; border-radius: 5px; }
        .progress-bar { width: 100%; height: 20px; background: #1a1a1a; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #0f0, #00ff88); width: 0%; transition: width 0.5s; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⛏️ XMR-MINER-WHOAMI.SEC</h1>
            <p>Client Dashboard - Monitorizează-ți nodurile de minerit</p>
        </div>
        
        <div class="stats-grid">
            <div class="stat">
                <div>📊 Nodurile Tale</div>
                <div class="stat-value" id="myNodes">0</div>
            </div>
            <div class="stat">
                <div>⛏️ Hashrate</div>
                <div class="stat-value" id="myHashrate">0</div>
                <div>H/s</div>
            </div>
            <div class="stat">
                <div>💰 XMR Minat</div>
                <div class="stat-value" id="myMined">0</div>
                <div>XMR</div>
            </div>
        </div>
        
        <div class="card">
            <h2>💰 CUMPĂRĂ NODURI DE MINERIT</h2>
            <select id="planSelect">
                <option value="10">Starter - 10 noduri (0.05 XMR)</option>
                <option value="25">Pro - 25 noduri (0.10 XMR)</option>
                <option value="50">Elite - 50 noduri (0.20 XMR)</option>
                <option value="100">Supreme - 100 noduri (0.35 XMR)</option>
            </select>
            <button onclick="generatePayment()">🔓 Generează Plată</button>
            <div id="paymentInfo" style="margin-top: 20px;"></div>
        </div>
        
        <div class="card">
            <h2>📊 STATUS NODURI</h2>
            <div id="nodesStatus">Loading...</div>
        </div>
        
        <div class="card">
            <h2>📈 PERFORMANȚĂ</h2>
            <div>Progres către următorul payout:</div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div id="nextPayout"></div>
        </div>
    </div>
    
    <script>
        let clientData = JSON.parse(localStorage.getItem('clientMiningData') || '{"nodes":0,"hashrate":0,"mined":0}');
        
        function updateDisplay() {
            document.getElementById('myNodes').innerText = clientData.nodes;
            document.getElementById('myHashrate').innerText = clientData.hashrate;
            document.getElementById('myMined').innerText = clientData.mined.toFixed(6);
            
            const progress = Math.min((clientData.mined / 0.1) * 100, 100);
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('nextPayout').innerHTML = `Minerit curent: ${clientData.mined.toFixed(6)} XMR / 0.1 XMR pentru payout`;
        }
        
        function generatePayment() {
            const plan = document.getElementById('planSelect').value;
            let price = 0;
            let nodes = parseInt(plan);
            
            if (nodes === 10) price = 0.05;
            else if (nodes === 25) price = 0.10;
            else if (nodes === 50) price = 0.20;
            else if (nodes === 100) price = 0.35;
            
            const address = "8BuSHCofBXzAti2oQemtqo1j8q2UZHQBpFwqvJa6pMyUWp6x4QZTaWuHBmUxRb5S9Z6KZCqCaosZw78G9ufrffSz6AXjUhJ";
            
            document.getElementById('paymentInfo').innerHTML = `
                <div class="success">
                    <strong>💰 Instrucțiuni Plată</strong><br><br>
                    Trimite EXACT ${price} XMR la adresa:<br>
                    <div class="address-box">${address}</div>
                    După trimitere, nodurile tale vor fi activate în maxim 24h.<br><br>
                    <button onclick="simulatePayment(${nodes}, ${price})">✅ Am plătit (simulare)</button>
                </div>
            `;
        }
        
        function simulatePayment(nodes, price) {
            clientData.nodes += nodes;
            clientData.hashrate += nodes * 184;
            clientData.mined += 0;
            localStorage.setItem('clientMiningData', JSON.stringify(clientData));
            updateDisplay();
            document.getElementById('paymentInfo').innerHTML = '<div class="success">✅ Plată înregistrată! Nodurile tale sunt active.</div>';
            setTimeout(() => { document.getElementById('paymentInfo').innerHTML = ''; }, 3000);
        }
        
        function loadNodesStatus() {
            const nodesDiv = document.getElementById('nodesStatus');
            let html = '<div style="display:grid;grid-template-columns:repeat(20,1fr);gap:5px;">';
            for (let i = 1; i <= clientData.nodes; i++) {
                const isActive = Math.random() > 0.1;
                html += `<div style="background:${isActive ? '#0f0' : '#f00'};padding:5px;text-align:center;font-size:10px;border-radius:3px;">N${i}</div>`;
            }
            html += '</div>';
            nodesDiv.innerHTML = html || '<p>Nu ai noduri active. Cumpără noduri de minerit mai sus.</p>';
        }
        
        // Simulează minerit în timp real
        setInterval(() => {
            if (clientData.nodes > 0) {
                const increment = (clientData.nodes * 0.000001);
                clientData.mined += increment;
                clientData.hashrate = clientData.nodes * (180 + Math.random() * 20);
                localStorage.setItem('clientMiningData', JSON.stringify(clientData));
                updateDisplay();
                loadNodesStatus();
            }
        }, 5000);
        
        updateDisplay();
        loadNodesStatus();
    </script>
</body>
</html>
