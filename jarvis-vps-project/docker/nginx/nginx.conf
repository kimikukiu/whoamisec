server {
    listen 8080;
    server_name whoamisec.com www.whoamisec.com _;

    root /workspace;
    index index.html;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Static HTML files (serve directly from filesystem)
    location = / {
        try_files /index.html =404;
    }
    location = /index.html {
        try_files /index.html =404;
    }
    location = /mining.html {
        try_files /mining.html =404;
    }
    location = /jarvis.html {
        try_files /jarvis.html =404;
    }
    location = /login.html {
        try_files /login.html =404;
    }
    location = /dashboard.html {
        try_files /dashboard.html =404;
    }
    location = /admin.html {
        try_files /admin.html =404;
    }

    # Clean URL routes -> proxy to Flask which serves HTML
    location /mining {
        proxy_pass http://127.0.0.1:5001/mining;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /jarvis {
        proxy_pass http://127.0.0.1:5001/jarvis;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /login {
        proxy_pass http://127.0.0.1:5001/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /dashboard {
        proxy_pass http://127.0.0.1:5001/dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /admin {
        proxy_pass http://127.0.0.1:5001/admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API proxy to Flask backend
    location /api {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:5001/api/v1/health;
        proxy_set_header Host $host;
    }

    location = /cicada.html {
        try_files /cicada.html =404;
    }
    location /cicada {
        proxy_pass http://127.0.0.1:5001/cicada;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
