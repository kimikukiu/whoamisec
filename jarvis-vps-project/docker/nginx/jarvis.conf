server {
    listen 80;
    server_name whoamisec.com www.whoamisec.com jarvis.whoamisec.com mining.whoamisec.com cicada.whoamisec.com xmr-miner.whoamisec.com;

    # Main site
    location / {
        root /var/www/html;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # JARVIS MIND API
    location /jarvis/ {
        proxy_pass http://jarvis-mind:5004/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend-api:5001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Monero API
    location /monero/ {
        proxy_pass http://monero-api:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Subscription System
    location /subscribe/ {
        proxy_pass http://subscription:5005/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Cicada 3301
    location /cicada/ {
        proxy_pass http://cicada3301:5050/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Ollama API
    location /ollama/ {
        proxy_pass http://ollama:11434/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Mining Fleet
    location /miner/ {
        proxy_pass http://miner-fleet:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # XMRig API
    location /xmrig/ {
        proxy_pass http://miner-fleet:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
