<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHOAMI.SEC | Admin Panel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --green: #00ff41;
            --green-dim: #00cc33;
            --green-dark: #008822;
            --green-glow: rgba(0,255,65,0.3);
            --bg-dark: #0a0a0a;
            --bg-mid: #1a1a2e;
            --bg-card: rgba(10,15,10,0.85);
            --border: rgba(0,255,65,0.2);
            --text-dim: #66ff88;
            --text-darker: #339955;
            --red: #ff0040;
            --amber: #ffaa00;
        }
        body {
            font-family: 'Fira Code', monospace;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-mid) 50%, #0d1117 100%);
            color: var(--green);
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 24px;
        }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .logo { font-size: 1.3rem; font-weight: 700; text-shadow: 0 0 15px var(--green-glow); text-decoration: none; color: var(--green); }
        .logo span { color: var(--red); }
        .admin-badge {
            padding: 4px 12px;
            background: rgba(255,0,64,0.1);
            border: 1px solid rgba(255,0,64,0.3);
            border-radius: 4px;
            font-size: 0.7rem;
            color: var(--red);
            letter-spacing: 2px;
        }
        .btn-nav {
            padding: 8px 16px;
            font-family: 'Fira Code', monospace;
            font-size: 0.7rem;
            background: transparent;
            color: var(--green-dim);
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .btn-nav:hover {
            background: rgba(0,255,65,0.1);
            border-color: var(--green);
        }
        .btn-nav.danger {
            color: var(--red);
            border-color: rgba(255,0,64,0.3);
        }
        .btn-nav.danger:hover {
            background: rgba(255,0,64,0.1);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .section-title {
            font-size: 1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .users-table-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        .users-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }
        .users-table thead {
            background: rgba(0,255,65,0.05);
            border-bottom: 1px solid var(--border);
        }
        .users-table th {
            padding: 12px 16px;
            text-align: left;
            font-size: 0.7rem;
            color: var(--text-darker);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .users-table td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(0,255,65,0.05);
        }
        .users-table tr:hover {
            background: rgba(0,255,65,0.02);
        }
        .users-table .admin-badge {
            padding: 2px 8px;
            font-size: 0.6rem;
        }
        .admin-yes {
            background: rgba(255,0,64,0.1);
            border: 1px solid rgba(255,0,64,0.3);
            border-radius: 3px;
            color: var(--red);
        }
        .admin-no {
            color: var(--text-darker);
        }

        .credits-input {
            font-family: 'Fira Code', monospace;
            font-size: 0.75rem;
            background: rgba(0,0,0,0.5);
            color: var(--amber);
            border: 1px solid rgba(255,170,0,0.2);
            border-radius: 4px;
            padding: 6px 10px;
            width: 80px;
            text-align: center;
            outline: none;
        }
        .credits-input:focus {
            border-color: var(--amber);
            box-shadow: 0 0 10px rgba(255,170,0,0.2);
        }

        .btn-update {
            padding: 6px 14px;
            font-family: 'Fira Code', monospace;
            font-size: 0.65rem;
            background: var(--green);
            color: #000;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            letter-spacing: 1px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-update:hover {
            background: #33ff66;
            box-shadow: 0 0 15px var(--green-glow);
        }

        .error-box {
            background: rgba(255,0,64,0.1);
            border: 1px solid rgba(255,0,64,0.3);
            border-radius: 6px;
            padding: 12px;
            font-size: 0.75rem;
            color: var(--red);
            margin-bottom: 16px;
            display: none;
        }
        .error-box.show { display: block; }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-darker);
            font-size: 0.8rem;
        }

        .stats-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .mini-stat {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px 24px;
            flex: 1;
            min-width: 150px;
        }
        .mini-stat .label {
            font-size: 0.65rem;
            color: var(--text-darker);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .mini-stat .value {
            font-size: 1.3rem;
            font-weight: 700;
            margin-top: 4px;
        }
        .mini-stat .value.amber { color: var(--amber); }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.75rem;
            color: var(--green);
            z-index: 1000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.error { border-color: rgba(255,0,64,0.3); color: var(--red); }

        @media (max-width: 768px) {
            header { flex-direction: column; gap: 12px; }
            .users-table { font-size: 0.7rem; }
            .users-table th, .users-table td { padding: 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <a href="index.html" class="logo">WHOAMI<span>.SEC</span></a>
                <span class="admin-badge">ADMIN PANEL</span>
            </div>
            <div style="display:flex;gap:8px;">
                <a href="dashboard.html" class="btn-nav">DASHBOARD</a>
                <a href="index.html" class="btn-nav">HOME</a>
                <button class="btn-nav danger" onclick="logout()">LOGOUT</button>
            </div>
        </header>

        <div class="stats-bar">
            <div class="mini-stat">
                <div class="label">Total Users</div>
                <div class="value" id="total-users">0</div>
            </div>
            <div class="mini-stat">
                <div class="label">Total Credits Issued</div>
                <div class="value amber" id="total-credits">0</div>
            </div>
            <div class="mini-stat">
                <div class="label">Admin Users</div>
                <div class="value" id="admin-count">0</div>
            </div>
        </div>

        <div class="section-header">
            <h2 class="section-title">&#128101; USER MANAGEMENT</h2>
            <button class="btn-nav" onclick="loadUsers()">&#8635; REFRESH</button>
        </div>

        <div class="error-box" id="error-box"></div>

        <div class="users-table-container">
            <div class="loading" id="loading">Loading users...</div>
            <table class="users-table" id="users-table" style="display:none">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Credits</th>
                        <th>Admin</th>
                        <th>Created</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="users-tbody"></tbody>
            </table>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:5001' : '';

        function getToken() { return localStorage.getItem('whoamisec_token'); }

        function showError(msg) {
            const box = document.getElementById('error-box');
            box.textContent = msg;
            box.classList.add('show');
        }
        function hideError() { document.getElementById('error-box').classList.remove('show'); }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Check admin access
        (async function() {
            const token = getToken();
            if (!token) { window.location.href = 'login.html'; return; }
            try {
                const res = await fetch(API_BASE + '/api/auth/me', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!res.ok) throw new Error('Not authenticated');
                const data = await res.json();
                const user = data.user || data;
                if (!user.is_admin) {
                    showError('Access denied. Admin privileges required.');
                    return;
                }
                loadUsers();
            } catch (e) {
                showError('Authentication failed. Please log in again.');
                setTimeout(() => { window.location.href = 'login.html'; }, 2000);
            }
        })();

        async function loadUsers() {
            hideError();
            const loading = document.getElementById('loading');
            const table = document.getElementById('users-table');
            loading.style.display = 'block';
            loading.textContent = 'Loading users...';
            table.style.display = 'none';

            try {
                const res = await fetch(API_BASE + '/api/admin/users', {
                    headers: { 'Authorization': 'Bearer ' + getToken() }
                });
                if (!res.ok) throw new Error('Failed to fetch users');
                const users = await res.json();

                loading.style.display = 'none';
                table.style.display = 'table';

                const tbody = document.getElementById('users-tbody');
                tbody.innerHTML = '';

                let totalCredits = 0;
                let adminCount = 0;

                users.forEach(user => {
                    totalCredits += user.credits || 0;
                    if (user.is_admin) adminCount++;

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="color:var(--text-darker)">#${user.id}</td>
                        <td style="color:var(--green)">${escapeHTML(user.username)}</td>
                        <td style="color:var(--text-dim)">${escapeHTML(user.email || '---')}</td>
                        <td>
                            <input type="number" class="credits-input" value="${user.credits || 0}" data-userid="${user.id}" data-original="${user.credits || 0}">
                        </td>
                        <td>
                            ${user.is_admin ? '<span class="admin-badge admin-yes">ADMIN</span>' : '<span class="admin-no">USER</span>'}
                        </td>
                        <td style="color:var(--text-darker);font-size:0.7rem">${user.created_at ? new Date(user.created_at).toLocaleDateString() : '---'}</td>
                        <td>
                            <button class="btn-update" onclick="updateCredits(${user.id}, this)">UPDATE</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                document.getElementById('total-users').textContent = users.length;
                document.getElementById('total-credits').textContent = totalCredits.toLocaleString();
                document.getElementById('admin-count').textContent = adminCount;

            } catch (e) {
                loading.textContent = 'Failed to load users. Check that the backend is running.';
                loading.style.color = 'var(--red)';
            }
        }

        async function updateCredits(userId, btn) {
            const input = document.querySelector(`.credits-input[data-userid="${userId}"]`);
            const newCredits = parseInt(input.value);
            const original = parseInt(input.dataset.original);

            if (newCredits === original) {
                showToast('No changes to apply');
                return;
            }

            btn.disabled = true;
            btn.textContent = '...';

            try {
                const res = await fetch(API_BASE + '/api/admin/user/' + userId + '/credits', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + getToken()
                    },
                    body: JSON.stringify({ credits: newCredits })
                });

                if (res.ok) {
                    showToast('Credits updated to ' + newCredits);
                    input.dataset.original = newCredits;
                    btn.textContent = 'DONE';
                    setTimeout(() => { btn.textContent = 'UPDATE'; }, 1500);
                    // Refresh stats
                    const totalEl = document.getElementById('total-credits');
                    const currentTotal = parseInt(totalEl.textContent.replace(/,/g, ''));
                    totalEl.textContent = (currentTotal - original + newCredits).toLocaleString();
                } else {
                    const data = await res.json();
                    showToast(data.error || 'Update failed', true);
                    btn.textContent = 'UPDATE';
                }
            } catch (e) {
                showToast('Failed to update credits', true);
                btn.textContent = 'UPDATE';
            }
            btn.disabled = false;
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str || '';
            return div.innerHTML;
        }

        function logout() {
            localStorage.removeItem('whoamisec_token');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
