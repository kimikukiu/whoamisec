# ============================================================
# VPS-02 — nginx config for cicada.omni + subdomains
# Place at: /etc/nginx/sites-enabled/cicada.conf
# Run: certbot --nginx -d cicada.omni -d apk.cicada.omni -d puzzle.cicada.omni
# ============================================================

server {
    listen 80;
    server_name cicada.omni apk.cicada.omni puzzle.cicada.omni;
    return 301 https://$host$request_uri;
}

# ── cicada.omni ──────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name cicada.omni;

    ssl_certificate     /etc/letsencrypt/live/cicada.omni/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cicada.omni/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    root /var/www/cicada;
    index cicada.html;

    add_header X-Frame-Options DENY;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / { try_files $uri /cicada.html; }

    location /api/ {
        proxy_pass http://127.0.0.1:5002/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# ── apk.cicada.omni — APK mirror ────────────────────────────
server {
    listen 443 ssl http2;
    server_name apk.cicada.omni;

    ssl_certificate     /etc/letsencrypt/live/cicada.omni/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cicada.omni/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    root /var/apk;
    autoindex on;
    autoindex_exact_size off;

    location / {
        add_header Content-Disposition 'attachment';
        types { application/vnd.android.package-archive apk; }
        try_files $uri =404;
    }
}

# ── puzzle.cicada.omni ───────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name puzzle.cicada.omni;

    ssl_certificate     /etc/letsencrypt/live/cicada.omni/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cicada.omni/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    root /var/www/cicada;
    location / { try_files $uri /cicada.html; }
}
