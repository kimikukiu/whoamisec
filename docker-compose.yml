version: '3.8'

services:

  # ── Nginx — serves all HTML + proxies to API ──────────────
  web:
    image: nginx:alpine
    ports:
      - "80:8080"       # VPS: http://YOUR_IP/
      - "8080:8080"     # Codespace: http://localhost:8080/
    volumes:
      - .:/var/www/whoamisec:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - apk_data:/var/apk:ro
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      retries: 3

  # ── Flask API — auth, subscriptions, VPS mgmt, AI ─────────
  api:
    build: .
    ports:
      - "5001:5001"
    volumes:
      - ./backend:/app
      - api_data:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-whoamisec-secret-2026}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-whoamisec-jwt-2026}
      - OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/v1/health"]
      interval: 30s
      retries: 3

  # ── APK Watchdog — auto-downloads APKs from GitHub Releases ─
  # Runs always (no profile) — just needs GH_APK_WATCHDOG_TOKEN
  apk-watchdog:
    image: alpine:3.19
    volumes:
      - apk_data:/var/apk
      - ./apk-watchdog.sh:/watchdog.sh:ro
    environment:
      - GH_APK_WATCHDOG_TOKEN=${GH_APK_WATCHDOG_TOKEN:-}
      - APK_DIR=/var/apk
    command: >
      sh -c "
        if [ -z \"$$GH_APK_WATCHDOG_TOKEN\" ]; then
          echo '[apk-watchdog] No token set — skipping. Set GH_APK_WATCHDOG_TOKEN to enable auto-download.';
          sleep infinity;
        else
          sh /watchdog.sh;
        fi
      "
    restart: unless-stopped

  # ── Cloudflare Tunnel — optional free domain (no DNS needed) ─
  # Setup once: bash tunnel-setup.sh → copy token to .env
  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    depends_on:
      - web
    restart: unless-stopped
    profiles:
      - tunnel   # start with: docker compose --profile tunnel up -d

volumes:
  api_data:
  apk_data:
