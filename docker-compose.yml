version: '3.8'
services:
  web:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - .:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
    restart: unless-stopped

  api:
    build: .
    ports:
      - "5001:5001"
    volumes:
      - ./backend:/app
      - api_data:/app/data
    environment:
      - SECRET_KEY=whoamisec-production-secret-2026
      - JWT_SECRET_KEY=whoamisec-jwt-production-key
    restart: unless-stopped

volumes:
  api_data:
