version: '3.8'

services:
  web:
    image: nginx:alpine
    ports: ["8080:8080"]
    volumes:
      - .:/var/www/whoamisec:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - apk_data:/var/apk:ro
    depends_on: [api]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s; retries: 3
    networks: [whoamisec-net]

  api:
    build: .
    ports: ["5001:5001"]
    volumes:
      - ./backend:/app
      - api_data:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-whoamisec-secret-change-me}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-whoamisec-jwt-change-me}
      - OLLAMA_HOST=http://host.docker.internal:11434
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:-whoamisecadmin}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-changeme}
      - S3_REGION=us-east-1
      - S3_BUCKET=backups
    extra_hosts: ["host.docker.internal:host-gateway"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/v1/health"]
      interval: 30s; retries: 3
    networks: [whoamisec-net]

  minio:
    image: minio/minio:latest
    container_name: whoamisec-minio
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - minio_data1:/data1
      - minio_data2:/data2
      - minio_data3:/data3
      - minio_data4:/data4
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-whoamisecadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-changeme-minio-pass}
      - MINIO_BROWSER=on
      - MINIO_SERVER_URL=http://localhost:9000
      - MINIO_DOMAIN=minio.whoamisec.com
    command: server /data{1...4} --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s; timeout: 5s; retries: 5
    networks: [whoamisec-net]

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    environment: [TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}]
    depends_on: [web]
    restart: unless-stopped
    profiles: [tunnel]

  cicada-anti-ai:
    build: ./cicada-anti-ai
    ports: ["5110:5110"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5110/api/health"]
      interval: 30s; retries: 3
    networks: [whoamisec-net]

  cicada-puzzle-gate:
    build: ./cicada-anti-ai
    command: python cicada_puzzle_gate.py
    ports: ["5115:5115"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5115/api/health"]
      interval: 30s; retries: 3
    networks: [whoamisec-net]

  cicada-ultimate-gate:
    build: ./cicada-anti-ai
    command: python cicada_ultimate_puzzle.py
    ports: ["5120:5120"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5120/api/health"]
      interval: 30s; retries: 3
    networks: [whoamisec-net]

  cicada-payment:
    build: ./cicada-anti-ai
    command: python cicada_payment_gateway.py
    ports: ["5130:5130"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5130/api/health"]
      interval: 30s; retries: 3
    networks: [whoamisec-net]

  apk-watchdog:
    image: alpine:3.19
    volumes:
      - apk_data:/var/apk
      - ./apk-watchdog.sh:/watchdog.sh:ro
    environment:
      - GH_APK_WATCHDOG_TOKEN=${GH_APK_WATCHDOG_TOKEN:-}
      - APK_DIR=/var/apk
    command: sh /watchdog.sh
    restart: unless-stopped
    profiles: [apk]

volumes:
  api_data:
  apk_data:
  minio_data1:
  minio_data2:
  minio_data3:
  minio_data4:

networks:
  whoamisec-net:
    driver: bridge
